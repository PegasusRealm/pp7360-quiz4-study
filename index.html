<script>
const TL={nic:'Nicotine Withdrawal / Cessation',opi:'Opiate Withdrawal',dts:'Delirium Tremens (DTs) / Alcohol Withdrawal',tox:'Opiate Toxicity',ant:'Antidotes / Withdrawal Medications'};
const TC={nic:'t-nic',opi:'t-opi',dts:'t-dts',tox:'t-tox',ant:'t-ant'};
const QUIZ_SIZE=10;

const C=[
// NICOTINE WITHDRAWAL
{t:'nic',q:"When do nicotine withdrawal symptoms begin and when do they peak? (from lecture)",a:"From lecture: Acute withdrawal can begin in <strong>2 hours</strong> after quitting smoking.<br><br>Symptoms <strong>peak within 24-48 hours</strong> and decline over the next 10 days to several weeks.<br><br><span class='hi'>Long-term effects:</span> Dysphoria and anhedonia may linger for <strong>several months</strong>."},
{t:'nic',q:"What are the symptoms of nicotine withdrawal? (from lecture)",a:"From lecture:<br>&bull; Severe cravings<br>&bull; Irritability<br>&bull; Difficulty concentrating<br>&bull; Restlessness<br>&bull; Impatience<br>&bull; Anger<br>&bull; Anxiety<br>&bull; Increased appetite<br>&bull; Weight gain<br>&bull; Insomnia<br><br><span class='hi'>Key:</span> Dysphoria and anhedonia may persist for months after acute withdrawal resolves."},
{t:'nic',q:"How does Bupropion (Wellbutrin/Zyban) help with smoking cessation? (from lecture)",a:"From lecture: Bupropion is an <strong>antidepressant</strong> classified as a reuptake inhibitor of <strong>dopamine and norepinephrine</strong> (Norepinephrine-Dopamine Reuptake Inhibitor (NDRI)).<br><br>&bull; <strong>Food and Drug Administration (FDA)-approved</strong> for smoking cessation<br>&bull; Delays smoking relapse<br>&bull; Reduces <strong>weight gain</strong> associated with smoking cessation<br>&bull; Acts as an <strong>antagonist at specific subtypes of nicotinic receptors</strong>"},
{t:'nic',q:"What is Varenicline and how does it work for smoking cessation? (from lecture)",a:"From lecture: Varenicline is classified as a <strong>partial nicotine agonist</strong>.<br><br>It <strong>partially stimulates</strong> the nicotine receptor &mdash; which helps <strong>reduce withdrawal symptoms</strong> &mdash; yet simultaneously <strong>minimizes the satisfaction</strong> (reward) associated with smoking.<br><br>Studies have found conflicting information on long-term cessation results."},
{t:'nic',q:"What is nicotine and what does it do in the brain? (from lecture)",a:"From lecture: Nicotine is the primary psychoactive compound in tobacco leaves. It is a <strong>Central Nervous System (CNS) stimulant</strong> that:<br><br>&bull; Activates <strong>acetylcholine receptors</strong><br>&bull; Enhances alertness, cognitive performance, and muscle control<br>&bull; Increases <strong>dopamine</strong> levels in the mesocorticolimbic reward system<br><br><span class='dg'>Toxicity:</span> 60 milligrams (mg) of nicotine can be fatal in an adult due to respiratory failure (paralysis of breathing muscles)"},
{t:'nic',q:"What are Nicotine Replacement Therapies (NRTs)? (from lecture)",a:"From lecture: Also called <strong>Potentially Reduced Exposure Products (PREPs)</strong>. Include gum, patches, and lozenges.<br><br><strong>Other products:</strong><br>&bull; Snus &mdash; moist powdered tobacco in pouches. Reduced smoking in Sweden but may increase pancreatic cancer risk.<br>&bull; Electronic cigarettes &mdash; initially thought safer, but cases of <strong>lung injury</strong> raised concerns.<br>&bull; <span class='hi'>Vitamin E acetate</span> (additive in some THC-containing vaping products) is strongly linked to lung injury.<br>&bull; Cigarette smoke and vaping aerosol are linked to <strong>lung inflammation and lowered immune function</strong>."},

// OPIATE WITHDRAWAL
{t:'opi',q:"What are the signs and symptoms of opiate withdrawal? (from lecture)",a:"From lecture: Creates <strong>profound physical illness and emotional distress</strong>.<br><br><strong>Signs/Symptoms:</strong><br>&bull; Vomiting<br>&bull; Clammy skin<br>&bull; Nasal sniffles<br>&bull; Diarrhea<br>&bull; Irritability<br>&bull; Agitation<br>&bull; Constant rubbing of leg muscles<br>&bull; <span class='hi'>Goose bumps</span><br>&bull; Restless legs<br>&bull; Flu-like symptoms, body aches, abdominal cramping<br><br><span class='hi'>Key from lecture:</span> Acute opioid withdrawal is <strong>NOT considered life-threatening</strong> (unlike alcohol/benzo withdrawal)."},
{t:'opi',q:"What is Opiate Abstinence Syndrome? (from lecture)",a:"From lecture: Following acute opioid withdrawal, there is a <strong>protracted opiate abstinence syndrome</strong> that can persist for <strong>up to six months</strong>.<br><br><strong>Symptoms include:</strong><br>&bull; Depression<br>&bull; Abnormal responses to stressful situations<br>&bull; <strong>Drug hunger</strong> (cravings)<br>&bull; Anxiety"},
{t:'opi',q:"What medications are given for specific opiate withdrawal symptoms? (from lecture)",a:"From lecture &mdash; <strong>Symptomatic relief:</strong><br><br>&bull; <strong>Vomiting:</strong> Promethazine<br>&bull; <strong>Diarrhea:</strong> Loperamide<br>&bull; <strong>Abdominal cramping:</strong> Dicyclomine<br>&bull; <strong>Irritability/agitation:</strong> Benzodiazepines<br>&bull; <strong>Nasal sniffles:</strong> Diphenhydramine (Benadryl)"},
{t:'opi',q:"What is the difference between opiates and opioids? (from lecture)",a:"From lecture:<br><br><strong>Opiates</strong> &mdash; Natural drugs derived from alkaloids of the poppy plant (morphine, codeine).<br><br><strong>Opioids</strong> &mdash; A broader class that includes opiates, opiopeptins, and all <strong>semisynthetic and synthetic</strong> drugs that mimic opiate actions.<br><br><strong>Semisynthetic:</strong> Heroin (diacetylmorphine), Oxycodone (Percodan/OxyContin)<br><strong>Synthetic:</strong> Fentanyl (Sublimaze), Methadone (Dolophine)"},
{t:'opi',q:"What are the three types of opioid receptors and their effects? (from lecture)",a:"From lecture:<br><br>&bull; <strong>Mu Receptors</strong> &mdash; High affinity for morphine. Found throughout brain, spinal cord, brainstem. Responsible for most clinical effects: <strong>analgesia, euphoria, sedation, respiratory depression, constipation</strong><br><br>&bull; <strong>Kappa Receptors</strong> &mdash; Located in amygdala, hypothalamus, pituitary gland. Involved in body temperature, fertility<br><br>&bull; <strong>Delta Receptors</strong> &mdash; Thought to have hallucinogenic effects. Play role in olfaction, motor integration, reinforcement, cognition"},

// DTs / ALCOHOL WITHDRAWAL
{t:'dts',q:"What is Delirium Tremens (DTs) and when does it occur? (from lecture)",a:"From lecture: Delirium Tremens is the <strong>most severe manifestation of alcohol withdrawal syndrome</strong>.<br><br><strong>Timing:</strong> Usually occurs within the first <strong>24-72 hours</strong> after cessation of alcohol.<br><br><strong>Presentation:</strong><br>&bull; Profound confusion<br>&bull; Agitation<br>&bull; Insomnia<br>&bull; Fever<br>&bull; Tachycardia<br>&bull; Diaphoresis (sweating)<br>&bull; Restlessness<br><br><span class='dg'>From lecture: Alcohol withdrawal carries a HIGH RISK OF MORTALITY.</span>"},
{t:'dts',q:"What are the four basic signs of alcohol withdrawal assessment? (from lecture)",a:"From lecture &mdash; Four basic steps to a simple assessment:<br><br><strong>1) Tachycardia</strong> (rapid heart rate)<br><strong>2) Hypertension</strong> (elevated blood pressure)<br><strong>3) Tremors</strong><br><strong>4) Diaphoresis</strong> (sweating)<br><br>The <strong>Clinical Institute Withdrawal Assessment (CIWA)</strong> for alcohol is used to predict risk for mild, moderate, severe withdrawal, or possible Delirium Tremens (DTs).<br><br><span class='hi'>Risk factor:</span> An individual who drinks heavily and in a steady manner is at greater risk for seizures or DTs."},
{t:'dts',q:"What medications are used for acute alcohol withdrawal/detox? (from lecture)",a:"From lecture:<br><br>&bull; <strong>Benzodiazepines</strong> (multiple daily doses on fixed schedule, gradually tapered over several days)<br>&bull; <strong>Chlordiazepoxide (Librium)</strong> &mdash; first choice, metabolized by liver<br>&bull; <strong>Lorazepam (Ativan)</strong> &mdash; used when liver cirrhosis is present (does NOT require hepatic metabolism)<br>&bull; Blood pressure medications for hypertension<br>&bull; <strong>Thiamine (Vitamin B-1)</strong> &mdash; 100 mg Intramuscular (IM) or by mouth (PO), essential for neuroprotection<br>&bull; <strong>Folate (Vitamin B-9)</strong><br>&bull; <strong>Magnesium sulfate</strong> &mdash; for post-withdrawal seizures<br><br><span class='hi'>DTs require:</span> Intensive Care Unit (ICU) admission with Intravenous (IV) benzodiazepines, thiamine, cardiac monitoring, seizure precautions."},
{t:'dts',q:"What medications are used for maintaining alcohol sobriety? (from lecture)",a:"<strong>1) Disulfiram (Antabuse)</strong> &mdash; inhibits acetaldehyde dehydrogenase enzyme. Stops liver from metabolizing alcohol &rarr; circulating acetaldehyde causes flushing, sweating, nausea, vomiting, difficulty breathing. Considered aversive therapy; requires full consent. Must be alcohol-free for 12 hours before starting. Avoid ANYTHING containing alcohol (vinegar, aftershave, mouthwash, cough meds) while taking and for 2 weeks after stopping.<br><br><strong>2) Acamprosate (Campral)</strong> &mdash; Gamma-Aminobutyric Acid (GABA) agonist + glutamate receptor inhibitor. Reduces cravings.<br><br><strong>3) Naltrexone (Vivitrol)</strong> &mdash; opioid antagonist. Blocks rewarding effects of alcohol. Patient must be opioid-free 7-10 days. Monthly Intramuscular (IM) injection ($1,294/vial). Monitor for depression/suicidality."},
{t:'dts',q:"How does alcohol affect the brain? (from lecture)",a:"From lecture: Alcohol activates <strong>Gamma-Aminobutyric Acid (GABA) and serotonin receptors</strong> in the Central Nervous System (CNS) and <strong>inhibits glutamate receptors</strong>.<br><br>&bull; Influences GABA-mediated chloride ion flow &rarr; neuronal inhibition &rarr; sedation, muscle relaxation, cognitive/motor impairment<br>&bull; Inhibits <strong>N-Methyl-D-Aspartate (NMDA) subtype of glutamate receptors</strong> in hippocampus, amygdala, and striatum &rarr; memory and motor impairment<br>&bull; Can cause <strong>blackouts</strong> by suppressing memory protein formation<br>&bull; GABAergic anxiolytic effects &rarr; high comorbidity of Alcohol Use Disorder (AUD) and anxiety disorders, especially panic attacks"},
{t:'dts',q:"What substances have the most pronounced withdrawal syndromes? (from lecture)",a:"From lecture &mdash; <strong>Categories with pronounced withdrawal:</strong><br><br>&bull; Alcohol<br>&bull; Opioids<br>&bull; Sedatives<br>&bull; Hypnotics<br>&bull; Anxiolytics<br><br>All GABA-influencing medicines show <strong>cross-tolerance</strong> and similar withdrawal patterns.<br><br><span class='dg'>Abrupt GABA withdrawal can cause:</span> Tachycardia, hypertension, diaphoresis, tremors, hyperthermia, <strong>seizures</strong>.<br><br>Withdrawal usually occurs within <strong>8-36 hours</strong>, can appear up to a week later."},

// OPIATE TOXICITY
{t:'tox',q:"What is the triad of opioid toxicity? (from lecture, green highlighted)",a:"From lecture &mdash; <strong>Opioid toxicity triad:</strong><br><br><strong>1) Miosis (pupillary constriction)</strong> &mdash; characteristic of ALL opiates <span class='dg'>except Meperidine (Demerol)</span>. Receptors in the oculomotor nerve control pupillary constriction.<br><br><strong>2) Stupor or comatose state</strong><br><br><strong>3) Respiratory failure</strong> &mdash; opiates cause profound respiratory depression by <strong>decreasing the brainstem's sensitivity to carbon dioxide (CO2)</strong>.<br><br><span class='hi'>Clinical pearl:</span> Respirations less than <strong>12 breaths per minute</strong> suggest acute opioid intoxication."},
{t:'tox',q:"What are the common side effects of opioids? (from lecture)",a:"From lecture:<br>&bull; Sedation<br>&bull; Nausea<br>&bull; <strong>Constipation</strong> (Opiate-Induced Constipation (OIC) is a major problem with long-term use)<br>&bull; <strong>Respiratory depression</strong><br>&bull; Pruritus (itching)<br>&bull; Endocrine dysfunction<br>&bull; Depression<br>&bull; Nightmares<br><br><span class='hi'>From lecture:</span> More than a million Americans have died from overdoses during the opioid epidemic. Fentanyl is the <strong>leading cause of death</strong> for Americans ages 18-45."},
{t:'tox',q:"What are the classifications of opioid drugs? (from lecture)",a:"From lecture:<br><br><strong>Full agonists</strong> (strong analgesic): Fentanyl, morphine, methadone, meperidine, heroin<br><br><strong>Partial agonist:</strong> Produces partial opiate effect (e.g., Buprenorphine)<br><br><strong>Mixed agonist-antagonist:</strong> Activates some receptor subtypes while blocking others<br><br><strong>Antagonist:</strong> Competes with Mu receptor, reverses analgesia from opioid agonist (e.g., Naloxone)<br><br><span class='hi'>Key concept:</span> Opioids work by binding to Mu, Delta, and Kappa receptors. <strong>Mu receptor</strong> is responsible for MOST clinical effects."},

// ANTIDOTES / MEDICATIONS
{t:'ant',q:"What is Naloxone (Narcan) and how does it work? (from lecture, green highlighted)",a:"From lecture: Naloxone is an <strong>opioid antagonist</strong> that quickly blocks Mu receptors in the brain. Effectively reverses opioid overdose, helping restore normal breathing.<br><br>&bull; <span class='hi'>Duration of action is SHORT: 1-2 hours</span> &mdash; multiple doses may be necessary<br>&bull; <strong>Narcan</strong> (brand name) is available as nasal spray, can be given by anyone without medical training<br>&bull; <strong>No prescription required</strong><br>&bull; Naloxone and <strong>Nalmefene</strong> can also be given Intravenously (IV)<br>&bull; <span class='hi'>Nalmefene has LONGER duration: 8-12 hours</span>"},
{t:'ant',q:"How does Clonidine (Catapres) work for opiate withdrawal? (from lecture)",a:"From lecture: Clonidine is a <strong>presynaptic alpha-2 receptor agonist</strong> used outpatient (usually <strong>7 days</strong>) for opiate withdrawal.<br><br>Mechanism of Action (MOA): <strong>Inhibits the activation of noradrenergic pathways stemming from the Locus Coeruleus Nucleus</strong> &rarr; beneficial in quieting/dulling withdrawal symptoms.<br><br><span class='dg'>Important:</span> Must be <strong>tapered over 2-4 days</strong> when discontinuing to avoid <strong>rebound hypertension</strong>."},
{t:'ant',q:"What is Buprenorphine (Subutex) and how does it work? (from lecture)",a:"From lecture: Buprenorphine is a <strong>synthetic opiate</strong> that acts as both an <strong>agonist AND antagonist</strong> at the Mu opiate receptor &mdash; meaning 50% binds to and 50% blocks the receptor.<br><br>&bull; Does NOT produce euphoria like other opiates<br>&bull; Lower risk of drug overdose<br>&bull; Dosed according to signs/symptoms of withdrawal<br>&bull; Tapered over <strong>5-10 days</strong><br>&bull; <strong>Schedule III</strong> controlled drug<br>&bull; Practitioners must meet Drug Enforcement Administration (DEA) qualifications to prescribe"},
{t:'ant',q:"What is Buprenorphine-Naloxone (Suboxone) and how is it different from Subutex? (from lecture)",a:"From lecture: Suboxone adds <strong>Naloxone (Narcan)</strong> to Buprenorphine.<br><br>The Food and Drug Administration (FDA) added Narcan as an <strong>additional safeguard against injectable overdose</strong> &mdash; if someone tries to inject Suboxone, the Naloxone component precipitates withdrawal.<br><br><strong>Naltrexone:</strong> FDA-approved to <strong>prevent opioid use relapse</strong> in people with NO physical dependence. Patients must:<br>&bull; Be advised analgesics will NOT be effective<br>&bull; Stop medication <strong>36 hours before surgery</strong> or situations requiring pain medications"},
{t:'ant',q:"What is Methadone and how is it used? (from lecture)",a:"From lecture: Methadone is classified as an <strong>opiate agonist</strong>, producing analgesia and sedation.<br><br>&bull; <strong>Schedule II</strong> controlled drug with separate registration<br>&bull; Patients usually go to <strong>methadone clinics</strong> or narcotic treatment centers<br>&bull; <span class='dg'>Overdoses can be fatal</span><br>&bull; Requires physical exam, Electrocardiogram (EKG), lab work, and routine Urine Drug Screen (UDS)<br>&bull; Half-life is very long (<strong>24 hours</strong>) with dangerous drug-to-drug interactions<br><br><span class='hi'>Pregnancy:</span> Methadone maintenance is the <strong>standard of care</strong> for pregnant women with active opiate addiction. Buprenorphine should also be considered (lower overdose risk, fewer interactions, outpatient)."},
{t:'ant',q:"What is Rapid Anesthesia-Aided Detoxification? (from lecture)",a:"From lecture: Narcan/Naltrexone and Clonidine are given <strong>Intravenously (IV)</strong> to an opioid-dependent person while under <strong>general anesthesia</strong>.<br><br>&bull; Anesthesia lasts approximately <strong>4-6 hours</strong><br>&bull; Rationale: allows patient to tolerate high doses of opioid antagonist and undergo detox while unconscious<br>&bull; Must be performed by a <strong>trained anesthesiologist</strong><br>&bull; Useful for patients who are <strong>detox-phobic</strong>"},
{t:'ant',q:"What are the risks of opiate withdrawal during pregnancy? (from lecture)",a:"From lecture: Stress from opiate withdrawal can cause:<br>&bull; Miscarriage<br>&bull; Preterm labor<br>&bull; Fetal distress<br>&bull; Fetal demise<br><br><strong>Treatment:</strong><br>&bull; <strong>Methadone maintenance</strong> = standard of care for pregnant women with active opiate addiction<br>&bull; <strong>Buprenorphine</strong> should also be considered: lower overdose risk, fewer drug interactions, outpatient basis<br>&bull; Disadvantages of buprenorphine: hepatic dysfunction, diversion risk<br><br><span class='dg'>Neonatal Abstinence Syndrome (NAS):</span> Newborns exposed to opioids &mdash; uncoordinated sucking, poor feeding, irritability, high-pitched crying, diarrhea, seizures. Increased 82% from 2010-2017."},
];

const Q=[
{t:'nic',q:"According to the lecture, nicotine withdrawal symptoms can begin as early as:",o:["30 minutes after quitting","2 hours after quitting","12 hours after quitting","24 hours after quitting"],c:1,e:"From lecture: 'Acute withdrawal symptoms can begin in 2 hours after quitting smoking.' Symptoms peak within 24-48 hours and decline over 10 days to several weeks."},
{t:'nic',q:"Which of the following is NOT listed as a nicotine withdrawal symptom in the lecture?",o:["Severe cravings and irritability","Increased appetite and weight gain","Hallucinations and psychosis","Difficulty concentrating and insomnia"],c:2,e:"The lecture lists cravings, irritability, difficulty concentrating, restlessness, impatience, anger, anxiety, increased appetite, weight gain, and insomnia. Hallucinations and psychosis are NOT associated with nicotine withdrawal."},
{t:'nic',q:"Bupropion (Wellbutrin/Zyban) aids smoking cessation through which mechanism?",o:["Partial nicotine receptor agonism","Gamma-Aminobutyric Acid (GABA) receptor activation","Dopamine and norepinephrine reuptake inhibition plus nicotinic receptor antagonism","Selective Serotonin Reuptake Inhibitor (SSRI) activity"],c:2,e:"From lecture: Bupropion is a dopamine/norepinephrine reuptake inhibitor (NDRI) AND acts as an antagonist at specific nicotinic receptor subtypes. It delays relapse and reduces weight gain from cessation."},
{t:'nic',q:"Varenicline works for smoking cessation by:",o:["Fully blocking all nicotinic receptors","Partially stimulating nicotine receptors to reduce withdrawal while minimizing smoking satisfaction","Increasing Gamma-Aminobutyric Acid (GABA) levels to reduce anxiety","Blocking dopamine reuptake"],c:1,e:"From lecture: Varenicline is a partial nicotine agonist. It partially stimulates the receptor (reducing withdrawal) while simultaneously minimizing the satisfaction/reward from smoking."},
{t:'nic',q:"What is the fatal dose of nicotine in an adult, and what causes death?",o:["30 milligrams (mg); cardiac arrest","60 mg; respiratory failure from paralysis of breathing muscles","100 mg; hepatic failure","120 mg; cerebral hemorrhage"],c:1,e:"From lecture: '60 mg of nicotine can be fatal in an adult due to respiratory failure (paralysis of the muscles that control breathing).' Poisoning can occur by inhalation, swallowing tobacco, or skin absorption."},
{t:'nic',q:"Dysphoria and anhedonia after nicotine cessation may linger for:",o:["A few days","1-2 weeks","Several months","Over a year in most cases"],c:2,e:"From lecture: 'Dysphoria and anhedonia may linger for several months.' Acute symptoms peak at 24-48 hours and decline over 10 days to weeks, but mood effects persist much longer."},
{t:'opi',q:"Which of the following is characteristic of opiate withdrawal but would NOT be expected in alcohol withdrawal?",o:["Tachycardia","Goose bumps and restless legs","Seizures","Diaphoresis"],c:1,e:"Goose bumps (piloerection) and restless legs are classic opiate withdrawal signs. Seizures are characteristic of alcohol/benzodiazepine withdrawal but NOT opiate withdrawal. The lecture states opiate withdrawal is NOT life-threatening."},
{t:'opi',q:"According to the lecture, acute opioid withdrawal is:",o:["Considered life-threatening due to seizure risk","NOT considered life-threatening","Always requires Intensive Care Unit (ICU) admission","Fatal without medication management"],c:1,e:"From lecture: 'Acute opioid withdrawal is not considered life-threatening.' This is a key distinction from alcohol and benzodiazepine withdrawal, which CAN be fatal. However, opiate withdrawal causes profound physical illness and emotional distress."},
{t:'opi',q:"Protracted opiate abstinence syndrome can persist for up to:",o:["2 weeks","1 month","3 months","6 months"],c:3,e:"From lecture: 'Opiate abstinence syndrome or protracted abstinence syndrome can persist for up to six months.' Symptoms include depression, abnormal stress responses, drug hunger, and anxiety."},
{t:'opi',q:"Which medication is given specifically for diarrhea during opiate withdrawal?",o:["Promethazine","Dicyclomine","Loperamide","Diphenhydramine (Benadryl)"],c:2,e:"From lecture symptomatic relief: Diarrhea = Loperamide. Vomiting = Promethazine. Abdominal cramping = Dicyclomine. Irritability/agitation = Benzodiazepines. Nasal sniffles = Diphenhydramine (Benadryl)."},
{t:'opi',q:"The Mu opioid receptor is primarily responsible for which effects?",o:["Hallucinations and olfaction","Body temperature and fertility","Analgesia, euphoria, sedation, respiratory depression, and constipation","Motor integration and cognitive function"],c:2,e:"From lecture: Mu receptors have high affinity for morphine and produce analgesia, euphoria, sedation, respiratory depression, and constipation (gastrointestinal motility). Kappa = body temp/fertility. Delta = hallucinations/olfaction/cognition."},
{t:'opi',q:"What distinguishes opiates from opioids?",o:["Opiates are synthetic; opioids are natural","Opiates are natural alkaloids from the poppy plant; opioids include all natural, semisynthetic, and synthetic drugs mimicking opiate actions","They are the same thing","Opioids only refer to prescription medications"],c:1,e:"From lecture: Opiates are natural (morphine, codeine from poppy). Opioids are the broader class including opiates plus semisynthetic (heroin, oxycodone) and synthetic (fentanyl, methadone) drugs."},
{t:'dts',q:"Delirium Tremens (DTs) typically occurs within what timeframe after alcohol cessation?",o:["2-6 hours","8-12 hours","24-72 hours","5-7 days"],c:2,e:"From lecture: DTs usually occur within the first 24-72 hours after cessation of alcohol. It is the most severe manifestation of alcohol withdrawal and carries high mortality risk."},
{t:'dts',q:"Which clinical tool is used to predict alcohol withdrawal severity and Delirium Tremens (DTs) risk?",o:["PHQ-9","Clinical Institute Withdrawal Assessment (CIWA)","CAGE questionnaire","AUDIT-C"],c:1,e:"From lecture: 'The Clinical Institute Withdrawal Assessment for alcohol is a clinical tool used to help predict which patients are at risk for mild withdrawal, moderate withdrawal, severe withdrawal, or possible DTs.'"},
{t:'dts',q:"When a patient with liver cirrhosis needs benzodiazepine treatment for alcohol withdrawal, which drug is preferred and why?",o:["Diazepam (Valium) because it has a longer half-life","Chlordiazepoxide (Librium) because it is first-line","Lorazepam (Ativan) because it does NOT require hepatic metabolism","Alprazolam (Xanax) because of rapid onset"],c:2,e:"From lecture: 'The liver metabolizes Librium. In cases of liver cirrhosis, Lorazepam (Ativan) may be used instead since it does not require hepatic metabolization.' This is a classic clinical decision point."},
{t:'dts',q:"Which vitamin is considered essential neuroprotective intervention during alcohol withdrawal?",o:["Vitamin C","Vitamin D","Thiamine (Vitamin B-1)","Vitamin B-12"],c:2,e:"From lecture: 'Vitamin B-1 (Thiamine) 100 mg IM/PO is essential for neuroprotective intervention.' Also given: Folate (B-9) and Magnesium sulfate for post-withdrawal seizures."},
{t:'dts',q:"Disulfiram (Antabuse) works by:",o:["Blocking opioid receptors involved in alcohol reward","Inhibiting acetaldehyde dehydrogenase so the liver cannot metabolize alcohol","Activating Gamma-Aminobutyric Acid (GABA) receptors to reduce cravings","Partially stimulating dopamine receptors"],c:1,e:"From lecture: Antabuse inhibits acetaldehyde dehydrogenase. Circulating acetaldehyde causes flushing, sweating, nausea, vomiting, difficulty breathing, dizziness. Aversive therapy requiring full consent. Patient must be alcohol-free 12 hours before starting."},
{t:'dts',q:"Naltrexone (Vivitrol) for alcohol cravings requires the patient to be opioid-free for:",o:["24 hours","3-5 days","7-10 days","30 days"],c:2,e:"From lecture: Patient must be opioid-free 7-10 days before starting. Contraindicated in current opioid use. A Naloxone challenge test is recommended. Urine Drug Screen (UDS) must be negative for opioids. Monthly injection costs $1,294 per vial."},
{t:'dts',q:"Alcohol causes blackouts by:",o:["Destroying hippocampal neurons permanently","Suppressing the transcription of memory protein formation and long-term encoding","Blocking all sensory input to the cortex","Depleting serotonin in the prefrontal cortex"],c:1,e:"From lecture: Alcohol inhibits NMDA glutamate receptors in hippocampus, amygdala, and striatum. It causes blackouts by 'suppressing the transcription of memory protein formation and long-term encoding of memory.'"},
{t:'tox',q:"The triad of opioid toxicity consists of (green highlighted in lecture):",o:["Tachycardia, hypertension, and tremors","Miosis (pupillary constriction), stupor/coma, and respiratory failure","Mydriasis (dilated pupils), agitation, and seizures","Bradycardia, hypothermia, and muscle rigidity"],c:1,e:"From lecture (green highlighted): 1) Miosis (pupillary constriction) — characteristic of ALL opiates EXCEPT meperidine (Demerol). 2) Stupor or comatose state. 3) Respiratory failure from decreased brainstem CO2 sensitivity. Respirations <12/min suggest acute intoxication."},
{t:'tox',q:"Which opiate is the exception to miosis (pupillary constriction) in opioid toxicity?",o:["Morphine","Fentanyl","Meperidine (Demerol)","Methadone"],c:2,e:"From lecture: 'Miosis: Pupillary constriction is characteristic of all opiates except meperidine (Demerol).' This is because meperidine has anticholinergic properties that can cause mydriasis (dilation) instead."},
{t:'tox',q:"Respirations below what rate suggest acute opioid intoxication?",o:["20 breaths per minute","16 breaths per minute","12 breaths per minute","8 breaths per minute"],c:2,e:"From lecture: 'Respirations less than 12 breaths per minute suggest acute opioid intoxication.' Opiates cause respiratory depression by decreasing the brainstem's sensitivity to carbon dioxide."},
{t:'tox',q:"According to the Drug Enforcement Administration (DEA), fentanyl is the leading cause of death for Americans between what ages?",o:["12 and 17","18 and 45","25 and 54","45 and 65"],c:1,e:"From lecture: 'According to the DEA, fentanyl is the leading cause of death for Americans between the ages of 18 and 45.' Between Jan-Feb 2026, DEA seized over 4.7 million fentanyl pills and nearly 2,396 pounds of powder."},
{t:'ant',q:"Naloxone (Narcan) has a short duration of action. How long does it last?",o:["15-30 minutes","1-2 hours","4-6 hours","8-12 hours"],c:1,e:"From lecture (highlighted): 'Naloxone's duration of action is short (1-2 hours), multiple doses may be necessary.' In contrast, Nalmefene has a longer duration of 8-12 hours. Narcan nasal spray can be given by anyone without training; no prescription required."},
{t:'ant',q:"Clonidine (Catapres) treats opiate withdrawal by:",o:["Blocking opioid receptors","Inhibiting noradrenergic pathways from the Locus Coeruleus Nucleus","Activating Gamma-Aminobutyric Acid (GABA) receptors","Partially stimulating Mu opioid receptors"],c:1,e:"From lecture: Clonidine is a presynaptic alpha-2 agonist that inhibits activation of noradrenergic pathways from the Locus Coeruleus, quieting withdrawal symptoms. Used outpatient for ~7 days. Must taper over 2-4 days to avoid rebound hypertension."},
{t:'ant',q:"Buprenorphine (Subutex) is unique because it acts as:",o:["A full Mu receptor agonist","Both an agonist AND antagonist at the Mu receptor (50% binds, 50% blocks)","A pure Mu receptor antagonist","A Kappa receptor selective agonist"],c:1,e:"From lecture: Buprenorphine is a synthetic opiate acting as both agonist and antagonist at Mu receptor — 50% binds to and 50% blocks. Does NOT produce euphoria, lower overdose risk. Schedule III, tapered over 5-10 days."},
{t:'ant',q:"Why was Naloxone (Narcan) added to Buprenorphine to create Suboxone?",o:["To increase analgesic effects","As an additional safeguard against injectable overdose","To extend the half-life","To reduce constipation side effects"],c:1,e:"From lecture: 'Narcan was added to this medication by the FDA as an additional safeguard against injectable overdose.' If someone tries to inject Suboxone, the Naloxone precipitates withdrawal."},
{t:'ant',q:"Before starting Naltrexone (Vivitrol) for alcohol cravings, which test is recommended?",o:["Liver function test","Naloxone challenge test","Electroencephalogram (EEG)","Thyroid panel"],c:1,e:"From lecture: 'A Naloxone challenge test is recommended' before starting Vivitrol. UDS must be negative for opioids. Patient must be opioid-free 7-10 days. Contraindicated in current opioid use/dependence."},
{t:'ant',q:"Methadone maintenance is the standard of care for which specific population?",o:["Adolescents with first-time opiate use","Pregnant women with active opiate addiction","Elderly patients with chronic pain","Patients with concurrent benzodiazepine dependence"],c:1,e:"From lecture: 'Methadone maintenance is the treatment recommendation and the standard of care for pregnant women who have an active opiate addiction.' Opiate withdrawal stress can cause miscarriage, preterm labor, fetal distress, or fetal demise."},
{t:'ant',q:"Nalmefene differs from Naloxone primarily in:",o:["Route of administration only","Duration of action (8-12 hours vs. 1-2 hours)","Receptor selectivity","Being available over the counter"],c:1,e:"From lecture: Naloxone lasts 1-2 hours (may need multiple doses). Nalmefene has a longer duration of 8-12 hours. Both can be given IV. This longer duration can be advantageous when reversing long-acting opioids."},
{t:'ant',q:"How long should Clonidine (Catapres) be tapered when discontinuing, and why?",o:["Immediately stopped; no taper needed","Tapered over 2-4 days to avoid rebound hypertension","Tapered over 2-4 weeks to avoid seizures","Tapered over 6 months to prevent relapse"],c:1,e:"From lecture: 'This medication should be tapered over 2 to 4 days when discontinuing to avoid rebound hypertension.' Clonidine is used outpatient for approximately 7 days during opiate withdrawal."},
{t:'tox',q:"In the 1990s, which clinical change contributed to the opioid epidemic?",o:["Opioids were reclassified as Schedule IV drugs","Pain was designated as the '5th vital sign' and opioid use expanded from cancer to chronic pain","Methadone clinics were defunded","Generic opioids became available over the counter"],c:1,e:"From lecture: 'In the 1990s, clinical guidelines to improve pain management insisted that pain should be treated as the 5th vital sign.' This led to expansion from cancer to chronic pain, and patients with depression/anxiety were at higher risk for overdose and more likely to receive higher opioid and benzodiazepine doses."},
{t:'dts',q:"How does Acamprosate (Campral) help maintain alcohol sobriety?",o:["Causes aversive reaction when alcohol is consumed","Acts as a GABA agonist and glutamate receptor inhibitor, reducing cravings","Blocks opioid receptors involved in alcohol reward","Replaces alcohol at GABA binding sites"],c:1,e:"From lecture: 'Campral (acamprosate) is considered a GABA agonist and an inhibitor of glutamate receptor activity.' It reduces cravings and increases abstinence by altering the development of tolerance. More effective than placebo."},
];
