ont-family:inherit;font-size:.88em;text-align:left;cursor:pointer;transition:all .2s;line-height:1.5}.qo:hover{border-color:var(--accent);background:rgba(78,205,196,.05)}.qo.correct{background:rgba(6,214,160,.15);border-color:var(--success);color:var(--success)}.qo.incorrect{background:rgba(255,107,107,.15);border-color:var(--danger);color:var(--danger)}.qo:disabled{cursor:default}.expl{margin-top:16px;padding:16px;background:rgba(78,205,196,.05);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;font-size:.88em;line-height:1.6}.rs{margin-bottom:24px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}.rs h2{font-size:1.05em;color:var(--accent);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}.rs ul{list-style:none;padding:0}.rs li{padding:6px 0 6px 16px;position:relative;font-size:.88em;line-height:1.6}.rs li::before{content:'\25B8';position:absolute;left:0;color:var(--accent)}.rs .mk{background:rgba(6,214,160,.08);padding:4px 8px;border-radius:4px;border-left:2px solid var(--success)}.btn{padding:10px 20px;border:none;border-radius:8px;font-family:inherit;font-weight:600;font-size:.85em;cursor:pointer;transition:all .2s}.bp{background:var(--accent);color:var(--bg)}.bp:hover{background:var(--accent2)}.br{display:flex;gap:8px;margin-top:16px;justify-content:center;flex-wrap:wrap}.fr{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}.fb{padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-family:inherit;font-size:.72em;font-weight:500;cursor:pointer;transition:all .2s}.fb.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}.fb:hover{border-color:var(--accent)}.mn{background:rgba(167,139,250,.1);border:1px solid rgba(167,139,250,.3);border-radius:8px;padding:12px 16px;margin:12px 0;font-size:.88em}.mn .mt{color:var(--purple);font-weight:600;font-size:.8em;text-transform:uppercase;letter-spacing: const C=[
{t:'serotonin',q:"What is Serotonin Syndrome and what causes it?",a:"A potentially <span class='dg'>life-threatening</span> condition caused by <strong>excess serotonergic activity</strong> in the Central Nervous System (CNS).<br><br>From lecture: results when high serotonin (5-Hydroxytryptamine (5-HT)) levels accumulate. More likely when a medication is <strong>first started or during a dose increase</strong>. Caused by combining serotonergic drugs or overdose. <span class='dg'>Can be fatal if not treated.</span>"},
{t:'serotonin',q:"What is the MADAMS / TIPS mnemonic for Serotonin Syndrome? (from Depression lecture slide)",a:"<strong>MADAMS:</strong><br><span class='hi'>M</span>ental status change &bull; <span class='hi'>A</span>gitation &bull; <span class='hi'>D</span>iarrhoea &bull; <span class='hi'>A</span>taxia &bull; <span class='hi'>M</span>yoclonus &bull; <span class='hi'>S</span>hivering<br><br><strong>TIPS:</strong><br><span class='hi'>T</span>remor &bull; <span class='hi'>I</span>ncreased reflexes (hyperreflexia) &bull; <span class='hi'>P</span>yrexia (fever) &bull; <span class='hi'>S</span>weating (diaphoresis)<br><br>Also: tachycardia, dilated pupils, severe muscle rigidity, seizures, unconsciousness"},
{t:'serotonin',q:"What specific drug combinations increase Serotonin Syndrome risk? (from Depression lecture)",a:"<strong>From lecture slides:</strong><br>&bull; Triptans (migraine): Almotriptan (Axert), Sumatriptan (Imitrex), Zolmitriptan (Zomig)<br>&bull; Pain meds: Fentanyl (Actiq/Sublimaze), Meperidine (Demerol), Tramadol (Ultram)<br>&bull; SNRIs: Duloxetine (Cymbalta), Venlafaxine (Effexor), Desvenlafaxine (Pristiq)<br>&bull; MAOIs: Isocarboxazid (Marplan), Phenelzine (Nardil)<br>&bull; Bupropion (Wellbutrin/Zyban), Trazodone (Desyrel)<br>&bull; Lithium (Eskalith, Lithobid)<br>&bull; Dextromethorphan (Over-the-Counter (OTC) cough meds)<br>&bull; Nausea drugs: Granisetron (Kytril), Metoclopramide (Reglan), Ondansetron (Zofran)<br>&bull; Illicit: LSD, cocaine, MDMA (ecstasy)<br>&bull; Supplements: St. John's Wort, ginseng<br><br><span class='hi'>Lecture highlight:</span> Paroxetine (Paxil) is MOST implicated in Serotonin Syndrome among SSRIs"},
{t:'serotonin',q:"What is the treatment for Serotonin Syndrome?",a:"<strong>1)</strong> Discontinue ALL serotonergic agents immediately<br><strong>2)</strong> Supportive care: Intravenous (IV) fluids, cooling, cardiac monitoring, benzodiazepines for agitation/seizures<br><strong>3) Cyproheptadine</strong> &mdash; serotonin antagonist (5-HT2A blocker) &mdash; first-line pharmacologic treatment<br><strong>4) Avoid:</strong> physical restraints (worsen hyperthermia), antipyretics (ineffective &mdash; hyperthermia is muscular, not hypothalamic)<br><br>Most cases resolve within <strong>24-72 hours</strong> of drug removal"},
{t:'serotonin',q:"What washout period is required when switching from a Selective Serotonin Reuptake Inhibitor (SSRI) to a Monoamine Oxidase Inhibitor (MAOI)?",a:"<strong>General rule: 14 days</strong> (at least 5 half-lives)<br><br><span class='dg'>Exception &mdash; Fluoxetine (Prozac):</span> Requires <strong>5 weeks (35 days)</strong> because its active metabolite norfluoxetine has a very long half-life (4-16 days)<br><br><strong>MAOI &rarr; SSRI:</strong> Also 14 days<br><br>From lecture: Fluoxetine has the most extended half-life of all antidepressants (2-3 days for parent drug)"},
{t:'tyramine',q:"Why must patients on Monoamine Oxidase Inhibitors (MAOIs) follow a tyramine-restricted diet? (from Depression lecture)",a:"From lecture: Tyramine is a naturally occurring substance derived from the <strong>aging process of foods and alcohol</strong>.<br><br>Monoamine Oxidase (MAO) enzymes metabolize tyramine in the intestines, preventing significant absorption.<br><br>MAOIs prevent tyramine breakdown &rarr; large amounts absorbed &rarr; stimulates release of catecholamines (dopamine and norepinephrine) &rarr; <span class='dg'>hypertensive crisis</span> requiring immediate medical attention."},
{t:'tyramine',q:"Which foods must be AVOIDED on a Monoamine Oxidase Inhibitor (MAOI) diet?",a:"<strong>HIGH TYRAMINE (AVOID):</strong><br>&bull; Aged cheeses (cheddar, Swiss, parmesan, blue, brie)<br>&bull; Cured/smoked meats (salami, pepperoni)<br>&bull; Fermented foods (sauerkraut, kimchi, miso, soy sauce)<br>&bull; Pickled foods, aged/pickled fish<br>&bull; Draft/tap beer, red wine (especially Chianti)<br>&bull; Fava/broad beans<br>&bull; Concentrated yeast extracts (Marmite)<br>&bull; Overripe bananas/avocados<br><br>From lecture slide: <strong>No cheese, no wine, no pickled foods</strong><br><span class='hi'>Memory rule:</span> AGED, CURED, FERMENTED, SPOILED"},
{t:'tyramine',q:"What other substances must patients on MAOIs avoid? (from Depression lecture Drug Interactions slide)",a:"From lecture &mdash; <strong>'No Popular Meds'</strong> with MAO Inhibitors:<br>&bull; Barbiturates<br>&bull; Tricyclic Antidepressants (TCAs)<br>&bull; Antihistamines<br>&bull; Central Nervous System (CNS) depressants<br>&bull; Antihypertensives<br>&bull; Over-the-Counter (OTC) cold medications<br><br>Also: stimulants, cocaine, Meperidine (Demerol) &mdash; <span class='dg'>NEVER combine with MAOIs</span>"},
{t:'tyramine',q:"What are the Monoamine Oxidase Inhibitors (MAOIs)? (from Depression lecture)",a:"<strong>From lecture:</strong><br>&bull; <strong>Eldepryl (Selegiline)</strong> &mdash; oral<br>&bull; <strong>Emsam (Selegiline patch)</strong> &mdash; transdermal, bypasses the gut<br>&bull; <strong>Marplan (Isocarboxazid)</strong><br>&bull; <strong>Nardil (Phenelzine)</strong> &mdash; most commonly prescribed<br>&bull; <strong>Parnate (Tranylcypromine)</strong><br><br>Used minimally due to fatal side effects. Reserved for <strong>refractory and severe depression</strong>.<br><br><span class='hi'>Emsam pearl:</span> At 6 milligrams per 24 hours (mg/24hr), no dietary restrictions (bypasses gut MAO-A)"},
{t:'tyramine',q:"How long must tyramine diet restrictions continue after stopping a Monoamine Oxidase Inhibitor (MAOI)?",a:"At least <strong>2 weeks (14 days)</strong> after last dose.<br><br>Irreversible MAOIs permanently inactivate Monoamine Oxidase (MAO) enzyme. Body needs ~14 days to synthesize new enzymes.<br><br>MAOIs inhibit the enzyme that metabolizes monoamine neurotransmitters (norepinephrine, serotonin, dopamine), increasing levels in the synaptic cleft."},
{t:'hypertensive',q:"What are the signs and symptoms of hypertensive crisis? (from Depression lecture)",a:"<strong>From lecture slide:</strong><br>&bull; <span class='dg'>Sudden explosive headache, usually in the occipital region</span><br>&bull; Elevated Blood Pressure (BP) (can exceed 180/120 mmHg)<br>&bull; Facial flushing<br>&bull; Palpitations<br>&bull; Pupillary dilation (mydriasis)<br>&bull; Diaphoresis (sweating)<br>&bull; Fever<br><br><span class='dg'>Complications:</span> Intracranial hemorrhage, stroke, cardiac arrhythmias, death<br>Onset: 15-90 minutes after tyramine ingestion"},
{t:'hypertensive',q:"What is the emergency treatment for Monoamine Oxidase Inhibitor (MAOI)-induced hypertensive crisis?",a:"<strong>1)</strong> Emergency Room (ER) immediately<br><strong>2) Phentolamine</strong> (alpha-adrenergic blocker) Intravenous (IV) &mdash; first-line<br><strong>3) Nifedipine</strong> sublingual (10 mg capsule, bite and swallow) &mdash; emergency rescue<br><strong>4) Nitroprusside</strong> IV for severe cases<br><br><span class='dg'>AVOID beta-blockers alone</span> &mdash; unopposed alpha stimulation worsens crisis<br><br><span class='hi'>Patient education:</span> Go to ER for ANY sudden severe headache while on MAOIs"},
{t:'benzo',q:"Why is benzodiazepine withdrawal potentially life-threatening? (from Anxiety lecture)",a:"From lecture: Benzodiazepines potentiate Gamma-Aminobutyric Acid (GABA), an inhibitory neurotransmitter. GABA-A receptor binding is responsible for anxiolytic, sedative, and anticonvulsant effects.<br><br>Chronic use &rarr; brain downregulates GABA-A receptors, upregulates excitatory glutamate/N-Methyl-D-Aspartate (NMDA) receptors.<br><br><span class='dg'>From lecture: Abrupt GABA withdrawal causes tachycardia, hypertension, diaphoresis, tremors, hyperthermia, seizures, and death.</span><br><br>All GABA-influencing medicines show <strong>cross-tolerance</strong> and similar withdrawal (including alcohol)."},
{t:'benzo',q:"What is the timeline for benzodiazepine withdrawal? (from Anxiety lecture)",a:"From lecture: <span class='hi'>Withdrawal usually occurs within 8-36 hours but can appear up to a week later.</span><br><br><strong>Short-acting</strong> (Alprazolam (Xanax), Lorazepam (Ativan)): More severe withdrawal, more rebound anxiety, higher addiction risk<br><br><strong>Long-acting</strong> (Clonazepam (Klonopin), Diazepam (Valium), Chlordiazepoxide (Librium)): Less severe withdrawal, less rebound anxiety<br><br>From lecture: Use short-term only &mdash; <strong>4-6 week course</strong> then gradual taper. Exception: panic disorder can take up to 1 year."},
{t:'benzo',q:"What is Flumazenil (Anexate)? (from Anxiety lecture)",a:"<strong>Benzodiazepine antagonist</strong> in the Central Nervous System (CNS). Onset: 1-2 minutes.<br><br>Used as <strong>reversal agent</strong> in overdoses, excessive sedation, respiratory depression. Binds at same site as benzodiazepines.<br><br><span class='dg'>Black Box Warning for Seizures</span> &mdash; prepare for seizure management when administering.<br><br>Contraindicated with Tricyclic Antidepressants (TCAs) &mdash; increases risk of cardiac arrhythmias and seizures."},
{t:'benzo',q:"What is the proper taper protocol for benzodiazepine discontinuation?",a:"<strong>TAPER SLOWLY &mdash; never abrupt discontinuation</strong><br><br>&bull; Reduce dose by <strong>10-25% every 1-2 weeks</strong><br>&bull; Slower taper for last 25% of dose<br>&bull; Total taper: often 2-6 months for long-term use<br><br><strong>Strategy:</strong> Convert short-acting &rarr; equivalent long-acting (Diazepam or Clonazepam) &rarr; taper the long-acting drug<br><br><span class='hi'>Why:</span> Long-acting = smoother plasma levels = gentler withdrawal<br><br>From lecture: Benzodiazepines contraindicated in patients with substance use disorder history."},
{t:'benzo',q:"Which benzodiazepines are indicated for which anxiety disorders? (from Anxiety lecture)",a:"From lecture:<br>&bull; <strong>Clonazepam (Klonopin)</strong> &mdash; Social Phobia and Generalized Anxiety Disorder (GAD)<br>&bull; <strong>Lorazepam (Ativan)</strong> &mdash; Panic Disorder<br>&bull; <strong>Alprazolam (Xanax)</strong> &mdash; Panic Disorder AND GAD<br><br>Key: Rapid onset; can be used as-needed (PRN). Patients with comorbid depression on sedatives need close suicide risk monitoring.<br><br>GABA-A receptor agonists &rarr; chloride (Cl&#x207B;) influx &rarr; inhibitory effect &rarr; cell cannot fire."},
{t:'benzo',q:"What are the first-line medications for Generalized Anxiety Disorder (GAD)? (from Anxiety lecture)",a:"<strong>First-line:</strong> Selective Serotonin Reuptake Inhibitors (SSRIs). Some research says SNRIs may be more effective.<br><br><strong>Other options from lecture:</strong><br>&bull; <strong>Buspirone (BuSpar)</strong> &mdash; as effective as benzos for GAD (NOT panic). Needs <strong>2 weeks</strong> to work. Best for benzo-na&iuml;ve patients. No dependency risk.<br>&bull; <strong>Pregabalin (Lyrica)</strong> &mdash; second-line; binds alpha-2-delta subunit of voltage-gated calcium channels, reducing glutamate release. FDA-approved for fibromyalgia. Watch for abuse potential.<br>&bull; <strong>Propranolol (Inderal)</strong> &mdash; beta-blocker for performance anxiety. Blocks sympathetic Autonomic Nervous System (ANS). Avoid in asthma, bradycardia, diabetes.<br>&bull; <strong>Hydroxyzine (Atarax/Vistaril)</strong> &mdash; antihistamine anxiolytic<br>&bull; Benzodiazepines &mdash; short-term only"},
{t:'benzo',q:"What role does Gamma-Aminobutyric Acid (GABA) play in anxiety? (from Anxiety lecture)",a:"From lecture: GABA is an <strong>inhibitory neurotransmitter</strong> found throughout the brain (cerebral cortex, thalamus, limbic structures). Primary role: <strong>reduce Central Nervous System (CNS) activity</strong>.<br><br>Helps manage fear and anxiety when neurons become overexcited. Synthesized from <strong>glutamate</strong>.<br><br><strong>Receptor subtypes:</strong><br>&bull; <strong>GABA-A</strong> &mdash; anxiolytic, sedative, anticonvulsant<br>&bull; <strong>GABA-B</strong> &mdash; muscle relaxant<br>&bull; <strong>GABA-C</strong> &mdash; retinal signal processing<br><br>Also regulates: appetite, metabolism, gut motility, inflammation, embryonic neural development."},
{t:'discontinuation',q:"What is Antidepressant Discontinuation Syndrome? What does FINISH stand for? (Depression lecture)",a:"Symptoms from abrupt cessation or rapid dose reduction of antidepressants (especially SSRIs/SNRIs).<br><br><strong>FINISH:</strong><br><span class='hi'>F</span> &mdash; Flu-like symptoms (fatigue, lethargy, myalgias, chills, headache)<br><span class='hi'>I</span> &mdash; Insomnia (sleep disturbances, vivid dreams)<br><span class='hi'>N</span> &mdash; Nausea (gastrointestinal (GI) symptoms, vomiting, diarrhea)<br><span class='hi'>I</span> &mdash; Imbalance (vertigo, dizziness, ataxia)<br><span class='hi'>S</span> &mdash; Sensory disturbance (electrical shock-like sensation in arms, legs, or head &mdash; <span class='dg'>'brain zaps'</span>)<br><span class='hi'>H</span> &mdash; Hyperarousal (anxiety, irritability, agitation)<br><br>'Brain zaps' are virtually <strong>pathognomonic</strong>"},
{t:'discontinuation',q:"What are the risk factors for Discontinuation Syndrome? (from Depression lecture slide)",a:"<strong>From lecture:</strong><br>&bull; Medications with <strong>short half-life</strong>: Paroxetine (Paxil), Sertraline (Zoloft), Venlafaxine (Effexor), Duloxetine (Cymbalta)<br>&bull; Abrupt discontinuation<br>&bull; Noncompliant, irregular use pattern<br>&bull; High dose range<br>&bull; Long-term treatment<br>&bull; Prior history of discontinuation syndrome<br>&bull; Females<br>&bull; Pregnancy<br>&bull; Younger age<br>&bull; <strong>Newborns</strong> exposed to antidepressants in utero<br><br><span class='hi'>Highest risk:</span> Paroxetine (Paxil)<br><span class='hi'>Lowest risk:</span> Fluoxetine (Prozac) &mdash; half-life 2-3 days, self-tapers"},
{t:'discontinuation',q:"Which antidepressant has HIGHEST vs. LOWEST Discontinuation Syndrome risk?",a:"<strong>HIGHEST (short half-life):</strong><br>&bull; <span class='dg'>Paroxetine (Paxil)</span> &mdash; worst among SSRIs<br>&bull; <span class='dg'>Venlafaxine (Effexor)</span> &mdash; half-life ~5 hours<br><br><strong>LOWEST (long half-life):</strong><br>&bull; <span class='hi'>Fluoxetine (Prozac)</span> &mdash; half-life 2-3 days; essentially self-tapers<br><br>From lecture on Paxil: <span class='hi'>Has significant discontinuation syndrome AND is most implicated in Serotonin Syndrome</span><br><br>Rule: Shorter half-life = higher discontinuation risk"},
{t:'discontinuation',q:"How do you prevent and manage Discontinuation Syndrome?",a:"<strong>Prevention:</strong> Taper gradually over 2-4 weeks minimum. Slower for Paroxetine/Venlafaxine: 4-8 weeks. Educate patients NEVER to stop abruptly.<br><br><strong>Management:</strong> Reinstate at last effective dose &rarr; resume slower taper. Severe cases: switch to Fluoxetine (long half-life) then taper Fluoxetine.<br><br><span class='hi'>vs. Relapse:</span> Discontinuation = starts within days, resolves with reinstatement in 24 hours. Relapse = 2-3 weeks to develop.<br><br>From lecture: Continue antidepressants at least <strong>8-12 months after stable remission</strong>. Two or more Major Depressive Disorder (MDD) episodes = usually lifelong medication."},
{t:'snri',q:"What are the SNRIs and how do they work? (from both lectures)",a:"<strong>Mechanism of Action (MOA):</strong> Block reuptake of BOTH serotonin (5-HT) and norepinephrine (NE) &mdash; similar to Tricyclic Antidepressants (TCAs) but <strong>more selective</strong> (targeting only these two).<br><br>From Depression lecture: Greater efficacy in <strong>melancholic depression</strong>. Effective for <strong>pain syndromes</strong>: fibromyalgia, mixed headaches, back pain, peripheral neuropathy.<br><br>From Anxiety lecture: Some research indicates SNRIs may be <strong>more effective than SSRIs</strong> for Generalized Anxiety Disorder (GAD). Side effects similar to SSRIs."},
{t:'snri',q:"Which SNRIs are used and for what? (from both lectures)",a:"<strong>From Anxiety lecture (FDA-approved):</strong><br>&bull; <strong>Venlafaxine (Effexor)</strong> &mdash; GAD, Social Phobia, Panic Disorder. Few drug interactions but <span class='dg'>more likely to induce mania</span>.<br>&bull; <strong>Duloxetine (Cymbalta)</strong> &mdash; GAD + pain management<br><br><strong>From Depression lecture:</strong><br>&bull; <strong>Desvenlafaxine (Pristiq)</strong> &mdash; active metabolite of Venlafaxine<br>&bull; <strong>Levomilnacipran (Fetzima)</strong> &mdash; more NE selectivity<br>&bull; <strong>Milnacipran (Savella)</strong> &mdash; fibromyalgia only<br><br><span class='hi'>Cymbalta pearl:</span> FDA-approved for diabetic neuropathic pain, fibromyalgia, chronic musculoskeletal pain, AND GAD &mdash; rational first choice when depression coexists with chronic pain"},
{t:'snri',q:"What are key side effects specific to SNRIs?",a:"<strong>Serotonergic (shared with SSRIs):</strong> Nausea, GI upset, sexual dysfunction, insomnia/somnolence, headache, dry mouth, diaphoresis<br><br><strong>Noradrenergic (unique to SNRIs):</strong><br>&bull; <span class='dg'>Dose-dependent hypertension</span> &mdash; monitor Blood Pressure (BP) regularly, especially Venlafaxine &ge;150 mg<br>&bull; Tachycardia<br>&bull; Diaphoresis (sweating)<br>&bull; Urinary hesitancy<br>&bull; Mydriasis (dilated pupils) &mdash; caution in narrow-angle glaucoma<br><br><strong>Black Box Warning:</strong> Increased suicidality in patients younger than 25"},
{t:'snri',q:"Why is Venlafaxine (Effexor) especially challenging to discontinue?",a:"<strong>Very short half-life</strong> &mdash; approximately 5 hours<br><br>Patients feel withdrawal even <strong>a few hours late</strong> taking a dose. Brain zaps extremely common.<br><br><strong>Taper:</strong> Very gradual over 4+ weeks. Some clinicians cross-taper to Fluoxetine first (long half-life), then stop Fluoxetine which self-tapers.<br><br><span class='hi'>Dose effect:</span> At low doses, acts primarily serotonergic. Norepinephrine (NE) effects clinically significant at <strong>&ge;150 milligrams (mg)</strong>."},
{t:'snri',q:"How do SNRIs compare to Tricyclic Antidepressants (TCAs)? (from Depression lecture)",a:"<strong>Both:</strong> Block reuptake of serotonin AND norepinephrine ('dual-action')<br><br><strong>TCAs also block:</strong> Histamine H1 (sedation, weight gain), Alpha-1 adrenergic (orthostatic hypotension), Muscarinic M1 (dry mouth, constipation, urinary retention), voltage-sensitive sodium channels in heart (cardiotoxicity)<br><br>From lecture: TCAs have <strong>narrow therapeutic index</strong>. Lethal dose = 1000 mg. <strong>Three C's of TCA toxicity: Convulsions, Coma, Cardiotoxicity.</strong><br><br>SNRIs avoid most extra receptor actions &rarr; much safer side-effect profile."},
{t:'snri',q:"What key SSRI facts pair with SNRI knowledge? (from Depression lecture)",a:"&bull; SSRIs are first-line for anxiety; inhibit amygdala activity and enhance GABA<br>&bull; <strong>47-70%</strong> see 50% improvement; <strong>30% non-responders</strong><br>&bull; Takes <strong>4-6 weeks</strong> for therapeutic effect<br>&bull; Continue <strong>8-12 months</strong> after stable remission<br>&bull; Six SSRIs: Prozac (Fluoxetine), Zoloft (Sertraline), Lexapro (Escitalopram), Celexa (Citalopram), Luvox (Fluvoxamine), Paxil (Paroxetine)<br>&bull; <span class='hi'>NOT interchangeable</span> despite same MOA<br><br>Pearls: Fluoxetine &rarr; apathy/fatigue/hypersomnia (NOT agitation). Sertraline &rarr; preferred in cardiovascular disease, lowest interactions, FDA PTSD-approved. Lexapro &rarr; rapid onset, 2x potent as Celexa. Celexa &rarr; QT prolongation. Paxil &rarr; only SSRI FDA-approved for 5 anxiety disorders."},
];

const Q=[
{t:'serotonin',q:"A patient on Sertraline (Zoloft) develops agitation, diarrhea, myoclonus, and hyperthermia hours after adding Tramadol (Ultram). Using MADAMS/TIPS, the most likely diagnosis is:",o:["Neuroleptic Malignant Syndrome (NMS)","Serotonin Syndrome","Malignant Hyperthermia","Anticholinergic Toxicity"],c:1,e:"Serotonin Syndrome: rapid onset, MADAMS (Mental status change, Agitation, Diarrhoea, Ataxia, Myoclonus, Shivering) + TIPS (Tremor, Increased reflexes, Pyrexia, Sweating). Caused by combining serotonergic drugs (SSRI + tramadol)."},
{t:'serotonin',q:"Which Selective Serotonin Reuptake Inhibitor (SSRI) is MOST implicated in Serotonin Syndrome? (from Depression lecture)",o:["Fluoxetine (Prozac)","Sertraline (Zoloft)","Paroxetine (Paxil)","Escitalopram (Lexapro)"],c:2,e:"From lecture slide on Paxil: 'Has significant discontinuation syndrome and is most implicated in serotonin syndrome.' Paroxetine is highest-risk SSRI for BOTH."},
{t:'serotonin',q:"First-line pharmacologic treatment for Serotonin Syndrome:",o:["Dantrolene","Bromocriptine","Cyproheptadine","Diphenhydramine"],c:2,e:"Cyproheptadine is a serotonin antagonist (5-HT2A blocker). Dantrolene/bromocriptine are for NMS. Most important step: discontinue all serotonergic agents."},
{t:'serotonin',q:"Washout period from Fluoxetine (Prozac) to a Monoamine Oxidase Inhibitor (MAOI):",o:["7 days","14 days","21 days","5 weeks (35 days)"],c:3,e:"Fluoxetine's active metabolite norfluoxetine has a very long half-life (4-16 days), requiring 5 weeks. All other SSRIs require 14 days."},
{t:'tyramine',q:"The tyramine-MAOI reaction occurs because (from Depression lecture):",o:["Tyramine blocks serotonin reuptake","Monoamine Oxidase (MAO) enzymes normally metabolize tyramine in the intestines","Cheese contains high serotonin levels","Tyramine directly stimulates dopamine receptors"],c:1,e:"From lecture: 'MAO enzymes play a crucial role in the metabolism of tyramine in the intestines, preventing any significant amount from being absorbed.' When inhibited, tyramine stimulates catecholamine (dopamine and norepinephrine) release."},
{t:'tyramine',q:"The Depression lecture Drug Interactions slide lists which as 'No Popular Meds' with MAOIs?",o:["Only Over-the-Counter (OTC) cold medications","Barbiturates, Tricyclic Antidepressants (TCAs), antihistamines, CNS depressants, antihypertensives, and OTC cold meds","Only SSRIs and SNRIs","Only sympathomimetic stimulants"],c:1,e:"From the slide: No barbiturates, TCAs, antihistamines, CNS depressants, antihypertensives, OTC cold meds. Plus food restrictions: no cheese, wine, pickled foods."},
{t:'hypertensive',q:"Patient on Phenelzine (Nardil) has sudden occipital headache, Blood Pressure (BP) 210/130, facial flushing after eating at a deli. First priority:",o:["Administer Propranolol (beta-blocker)","Administer Phentolamine (alpha-blocker) and transfer to Emergency Room (ER)","Give sublingual Nitroglycerin","Discontinue MAOI and observe"],c:1,e:"Hypertensive crisis from tyramine (deli = cured meats). Phentolamine IV is first-line. AVOID beta-blockers alone (unopposed alpha stimulation). From lecture: symptoms include sudden explosive occipital headache, elevated BP, facial flushing, palpitations, mydriasis, diaphoresis, fever."},
{t:'hypertensive',q:"Which Over-the-Counter (OTC) medication should patients on MAOIs AVOID?",o:["Acetaminophen (Tylenol)","Pseudoephedrine (Sudafed)","Ibuprofen (Advil)","Famotidine (Pepcid)"],c:1,e:"Pseudoephedrine is a sympathomimetic decongestant. Listed under 'OTC Cold Meds' on the Drug Interactions slide. Also from Anxiety lecture: decongestants like Sudafed can induce anxiety symptoms."},
{t:'benzo',q:"From the Anxiety lecture, benzodiazepine withdrawal is life-threatening primarily because of:",o:["Severe depression leading to suicide","Seizures from abrupt Gamma-Aminobutyric Acid (GABA) withdrawal","Cardiac arrhythmias from rebound sympathetic surge","Respiratory depression"],c:1,e:"From lecture: 'Abrupt withdrawal of GABA can cause tachycardia, hypertension, diaphoresis, tremors, hyperthermia, seizures, and death.'"},
{t:'benzo',q:"Flumazenil (Anexate) is a benzodiazepine reversal agent. Its most critical warning:",o:["Hepatotoxicity","Black Box Warning for Seizures","Serotonin Syndrome risk","QT prolongation"],c:1,e:"From lecture: Black Box Warning for Seizures. Must prepare for seizure management. Contraindicated with TCAs (increases cardiac arrhythmia and seizure risk). Onset: 1-2 minutes."},
{t:'benzo',q:"Which benzodiazepine is indicated for Social Phobia and GAD? (from Anxiety lecture)",o:["Alprazolam (Xanax)","Lorazepam (Ativan)","Clonazepam (Klonopin)","Triazolam (Halcion)"],c:2,e:"From lecture: Clonazepam (Klonopin) = Social Phobia + GAD. Lorazepam (Ativan) = Panic Disorder. Alprazolam (Xanax) = Panic + GAD."},
{t:'benzo',q:"Buspirone (BuSpar) takes how long before anti-anxiety effects begin?",o:["Same day","3-5 days","At least 2 weeks","6-8 weeks"],c:2,e:"From lecture: 'Must be taken consistently for at least 2 weeks.' Effective for GAD (NOT panic). Best for benzo-naive patients. No dependency risk."},
{t:'discontinuation',q:"The FINISH mnemonic stands for:",o:["Fatigue, Irritability, Numbness, Insomnia, Seizures, Hallucinations","Flu-like symptoms, Insomnia, Nausea, Imbalance, Sensory disturbances, Hyperarousal","Fever, Insomnia, Nausea, Impaired cognition, Sweating, Headache","Fatigue, Insomnia, Neuropathy, Imbalance, Syncope, Hypertension"],c:1,e:"FINISH = Flu-like, Insomnia, Nausea, Imbalance (vertigo/dizziness), Sensory disturbance ('brain zaps'), Hyperarousal. Brain zaps are pathognomonic."},
{t:'discontinuation',q:"Which of these is a risk factor for Discontinuation Syndrome? (from Depression lecture)",o:["Long half-life medications","Male sex","Low-dose treatment","Newborns exposed to antidepressants in utero"],c:3,e:"From lecture: SHORT half-life meds, abrupt stop, noncompliance, HIGH dose, long-term use, prior history, FEMALES, pregnancy, younger age, and NEWBORNS exposed in utero."},
{t:'discontinuation',q:"Patient stopped Venlafaxine (Effexor) 3 days ago: 'electric shocks' in head, dizziness, flu-like symptoms. Best management:",o:["Start a different SSRI","Reinstate Venlafaxine at last effective dose and begin gradual taper","Prescribe benzodiazepines","Reassure and take no action"],c:1,e:"Reinstate at last effective dose, then gradual taper over 4+ weeks. Venlafaxine's ~5 hour half-life makes discontinuation severe. Brain zaps = classic. Continue antidepressants 8-12 months after stable remission."},
{t:'snri',q:"SNRIs have greater efficacy than SSRIs specifically in (from Depression lecture):",o:["Atypical depression","Seasonal Affective Disorder (SAD)","Melancholic depression","Psychotic depression"],c:2,e:"From lecture: 'SNRIs have greater efficacy in melancholic depression.' Features: early morning awakening, weight loss, worse mood in morning, profound guilt, anhedonia, psychomotor changes."},
{t:'snri',q:"Which SNRI is FDA-approved for diabetic neuropathic pain, fibromyalgia, AND Generalized Anxiety Disorder (GAD)?",o:["Venlafaxine (Effexor)","Desvenlafaxine (Pristiq)","Duloxetine (Cymbalta)","Levomilnacipran (Fetzima)"],c:2,e:"Duloxetine (Cymbalta) has broadest indications: GAD + diabetic neuropathic pain + fibromyalgia + chronic musculoskeletal pain. Rational choice when depression coexists with chronic pain."},
{t:'snri',q:"Most important vital sign to monitor on SNRIs, especially Venlafaxine at higher doses:",o:["Temperature","Blood Pressure (BP)","Respiratory rate","Oxygen saturation"],c:1,e:"Dose-dependent hypertension from norepinephrine reuptake inhibition. Monitor BP at baseline and regularly, especially Venlafaxine at 150 mg and above where NE effects kick in."},
{t:'snri',q:"The three C's of Tricyclic Antidepressant (TCA) toxicity that make SNRIs a safer alternative:",o:["Confusion, Constipation, Cardiac failure","Convulsions, Coma, and Cardiotoxicity","Catatonia, Clonus, Cognitive decline","Cholinergic crisis, Coma, Cerebral edema"],c:1,e:"From lecture: TCA lethal dose = 1000 mg. Three C's: Convulsions, Coma, Cardiotoxicity. TCAs block sodium channels in heart. SNRIs avoid these extra receptor actions = much safer."},
];
