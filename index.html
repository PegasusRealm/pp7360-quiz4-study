<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PP7360 Final Exam Study Tool</title>
<style>
:root{
  --bg:#0f1419;--surface:#1a2028;--surface2:#222a35;--border:#2d3947;
  --text:#e8eef5;--text-dim:#9aabbe;--accent:#5eb3ff;--accent2:#7dd3a3;
  --warning:#ffb86c;--danger:#ff6b8a;--known:#7dd3a3;--unknown:#ffb86c;
  --gold:#ffd166;--radius:12px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding:12px;max-width:980px;margin:0 auto;-webkit-font-smoothing:antialiased}
h1{font-size:1.4em;color:var(--accent);text-align:center;margin-bottom:4px}
.sub{text-align:center;color:var(--text-dim);font-size:.85em;margin-bottom:14px}
.tabs{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
.tab{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:9px 14px;border-radius:8px;cursor:pointer;font-size:.88em;font-weight:500;transition:all .15s}
.tab:hover{border-color:var(--accent);color:var(--text)}
.tab.active{background:var(--accent);color:#0f1419;border-color:var(--accent);font-weight:600}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.btn{background:var(--accent);color:#0f1419;border:none;padding:10px 16px;border-radius:8px;cursor:pointer;font-size:.9em;font-weight:600;transition:all .15s}
.btn:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-sec:hover{border-color:var(--accent)}
.btn-warn{background:var(--warning);color:#0f1419}
.btn-known{background:var(--known);color:#0f1419}
.btn-unknown{background:var(--unknown);color:#0f1419}
.btn-mix{background:var(--gold);color:#0f1419}
.btn-ai{background:linear-gradient(135deg,#a78bfa,#5eb3ff);color:#fff}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
.hidden{display:none}
.statbar{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;font-size:.82em}
.stat{background:var(--surface);border:1px solid var(--border);padding:6px 10px;border-radius:6px;color:var(--text-dim)}
.stat strong{color:var(--accent)}

/* FLASHCARDS */
.flash{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;min-height:230px;cursor:pointer;display:flex;flex-direction:column;justify-content:center;text-align:center;transition:all .2s;position:relative}
.flash:hover{border-color:var(--accent)}
.flash .lbl{position:absolute;top:10px;left:14px;font-size:.7em;color:var(--text-dim);text-transform:uppercase;letter-spacing:.05em}
.flash .topic{position:absolute;top:10px;right:14px;font-size:.7em;color:var(--accent);text-transform:uppercase}
.flash .q{font-size:1.05em;color:var(--text);font-weight:500}
.flash .a{font-size:.95em;color:var(--text);text-align:left;line-height:1.6}
.flash .a strong{color:var(--accent2)}
.flash .hint{position:absolute;bottom:10px;font-size:.72em;color:var(--text-dim);width:100%;left:0;text-align:center}
.rate{display:flex;gap:6px;margin-top:10px}
.rate button{flex:1;padding:9px;border:none;border-radius:6px;cursor:pointer;font-size:.82em;font-weight:600}
.rate .again{background:var(--danger);color:#fff}
.rate .hard{background:var(--warning);color:#0f1419}
.rate .good{background:var(--accent2);color:#0f1419}
.rate .easy{background:var(--accent);color:#0f1419}

/* QUIZ */
.qmode{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
@media(max-width:520px){.qmode{grid-template-columns:1fr}}
.qmode button{padding:14px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:8px;cursor:pointer;font-size:.85em;font-weight:600;text-align:center;transition:all .15s}
.qmode button:hover{border-color:var(--accent)}
.qmode .known-btn:hover{border-color:var(--known)}
.qmode .unknown-btn:hover{border-color:var(--unknown)}
.qmode .mix-btn:hover{border-color:var(--gold)}
.qmode .desc{display:block;font-size:.72em;color:var(--text-dim);font-weight:400;margin-top:3px}
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.q-meta{display:flex;justify-content:space-between;margin-bottom:10px;font-size:.78em;color:var(--text-dim)}
.q-source{padding:2px 8px;border-radius:4px;font-size:.75em;font-weight:600}
.q-source.known{background:rgba(125,211,163,.15);color:var(--known)}
.q-source.unknown{background:rgba(255,184,108,.15);color:var(--unknown)}
.q-text{font-size:1em;margin-bottom:14px;line-height:1.5}
.opt{display:block;width:100%;text-align:left;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:11px 14px;border-radius:8px;margin-bottom:7px;cursor:pointer;font-size:.9em;transition:all .15s;line-height:1.4}
.opt:hover:not(:disabled){border-color:var(--accent);background:#2a3340}
.opt.correct{background:rgba(125,211,163,.18);border-color:var(--accent2);color:var(--accent2);font-weight:600}
.opt.wrong{background:rgba(255,107,138,.18);border-color:var(--danger);color:var(--danger)}
.opt:disabled{cursor:default}
.expl{margin-top:10px;padding:11px;background:var(--surface2);border-left:3px solid var(--accent);border-radius:6px;font-size:.85em;line-height:1.55;color:var(--text-dim)}
.expl strong{color:var(--accent)}

/* QUICK REF */
.filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-row button{background:var(--surface);border:1px solid var(--border);color:var(--text-dim);padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.78em;transition:all .15s}
.filter-row button.active{background:var(--accent);color:#0f1419;border-color:var(--accent)}
.ref-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.ref-section h2{font-size:1em;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid;color:var(--text)}
.ref-section ul{list-style:none}
.ref-section li{padding:7px 0 7px 12px;border-left:2px solid var(--border);margin-bottom:5px;font-size:.86em;line-height:1.55}
.ref-section li.must{border-left:3px solid var(--gold);background:rgba(255,209,102,.06);padding-left:10px}
.ref-section li strong{color:var(--text)}

/* AI MODAL */
.ai-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:100;padding:14px}
.ai-modal.show{display:flex}
.ai-content{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;max-width:520px;width:100%;max-height:90vh;overflow-y:auto}
.ai-content h3{color:var(--accent);margin-bottom:10px;font-size:1.1em}
.ai-loading{text-align:center;padding:24px;color:var(--text-dim)}
.spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* SHARE */
.share-step{background:var(--surface2);padding:10px 12px;border-radius:6px;margin-bottom:8px;font-size:.85em;line-height:1.55}
.share-step strong{color:var(--accent)}
code{background:#0a0e13;padding:2px 6px;border-radius:3px;color:var(--accent2);font-size:.85em}

/* MUST KNOW BADGE */
.mk-badge{display:inline-block;background:var(--gold);color:#0f1419;font-size:.65em;padding:2px 6px;border-radius:3px;font-weight:700;margin-left:6px;vertical-align:middle}
</style>
</head>

<div class="sub">Clinical Psychopharmacology · Quizzes 3–5 + Final Topics</div>

<div class="tabs">
  <button class="tab active" data-tab="quiz">Practice Quiz</button>
  <button class="tab" data-tab="flash">Flashcards</button>
  <button class="tab" data-tab="ref">Quick Reference</button>
  <button class="tab" data-tab="share">Share</button>
</div>

<div id="ct"></div>

<!-- AI Modal -->
<div class="ai-modal" id="aiModal">
  <div class="ai-content">
    <h3>AI Adaptive Quiz</h3>
    <div id="aiBody"></div>
    <button class="btn btn-sec" style="margin-top:10px;width:100%" onclick="closeAi()">Close</button>
  </div>
</div>

<script>
// =================== KNOWN POOL (from Psychopharm Quizzes.md - Quizzes 3-5 only) ===================
// Bold = correct answer in source. DO NOT ALTER.
const KNOWN = [
  // QUIZ 3
  {q:"Extrapyramidal side effects are believed to be the result of a reduction of dopamine in the:",
   o:["Mesocortical pathway","Mesolimbic pathway","Tuberoinfundibular pathway","Nigrostriatal pathway"],a:3,
   e:"EPS results from dopamine blockade in the nigrostriatal pathway, which controls movement.",src:"Q3"},
  {q:"Symptoms of drug-induced Parkinsonism (pseudoparkinsonism) consist of:",
   o:["Muscle spasms and rigidity","Abnormal rhythmic movements of the mouth, jaw, and face","Extreme internal restlessness","Shuffling gait and bradykinesia"],a:3,
   e:"Drug-induced Parkinsonism mimics Parkinson's disease: shuffling gait, bradykinesia, tremor, rigidity.",src:"Q3"},
  {q:"Conventional or atypical antipsychotics can make the negative symptoms of schizophrenia worse by blocking dopamine in the?",
   o:["Nigrostriatal pathway","Mesolimbic pathway","Tuberoinfundibular pathway","Mesocortical pathway"],a:3,
   e:"Mesocortical pathway dopamine blockade worsens negative/cognitive symptoms.",src:"Q3"},
  {q:"Hyperprolactinemia can result from dopamine blockade in the tuberoinfundibular pathway and result in the following symptoms:",
   o:["Amenorrhea, galactorrhea, and gynecomastia","Dysmenorrhea, mastitis, and polycystic ovarian syndrome","Weight gain, insulin resistance, and high triglycerides","Sore throat, fever, chills, and muscle rigidity"],a:0,
   e:"Dopamine normally inhibits prolactin. Blockade → prolactin rises → amenorrhea, galactorrhea, gynecomastia.",src:"Q3"},
  {q:"Atypical antipsychotics are chemically classified as:",
   o:["Dopamine antagonists","Serotonin-dopamine antagonists","Dopamine agonists","Serotonin reuptake inhibitors"],a:1,
   e:"Atypicals (2nd-gen) block both 5-HT2A and D2 — hence 'serotonin-dopamine antagonists' (SDAs).",src:"Q3"},
  {q:"A rhythmic, repetitive sucking and smacking movement of the lips; thrusting of the tongue in and out; movements may progress to limbs and can be irreversible. This is considered one of the most serious complications of antipsychotic drug treatment and is known as:",
   o:["Delirium tremens","Muscular dystrophy","Tardive dyskinesia","Akathisia"],a:2,
   e:"Tardive dyskinesia: late-onset, often irreversible involuntary movements from chronic D2 blockade.",src:"Q3"},
  {q:"Depakote (valproic acid) can be associated with these life-threatening side effects:",
   o:["Pancreatitis and hepatotoxicity","Appendicitis and endocarditis","Kidney failure and thrombocytopenia","Infertility and ovarian cysts"],a:0,
   e:"Valproate's two black box warnings: pancreatitis and hepatotoxicity (plus teratogenicity).",src:"Q3"},
  {q:"With acute lithium toxicity, which symptoms are prominent?",
   o:["Increased thirst, urination, and weight gain","Headache, cognitive slowing, and tremor","Diarrhea, vomiting, and ataxia","Acne, nausea, and hyperthyroidism"],a:2,
   e:"Acute lithium toxicity GI/neuro triad: diarrhea, vomiting, ataxia (then tremor, confusion, seizures).",src:"Q3"},
  {q:"Before administering Tegretol (carbamazepine) to patients of Asian ancestry, they should receive genetic testing because of their increased risk of:",
   o:["SJ syndrome and toxic epidermal necrolysis","Water intoxication and cardiac arrhythmias","Thrombocytopenia and gout","Aplastic anemia and agranulocytosis"],a:0,
   e:"HLA-B*1502 allele (common in Asian populations) → SJS/TEN risk with carbamazepine.",src:"Q3"},
  {q:"Which anticonvulsant is used for bipolar depression maintenance?",
   o:["Trileptal (oxcarbazepine)","Topamax (topiramate)","Lamictal (lamotrigine)","Depakote (valproic acid)"],a:2,
   e:"Lamotrigine is the go-to for bipolar depression maintenance. Watch for SJS — slow titration.",src:"Q3"},

  // QUIZ 4
  {q:"What are the symptoms of serotonin syndrome?",
   o:["Fever, confusion, muscle rigidity, tachycardia (fast heart rate), tremor, shivering, dilated pupils, and diarrhea","'Lead pipe rigidity,' high fever, dehydration, sweating, elevated blood pressure, agitation, fast heart rate, and respiration","Miosis (excessive pupil constriction), urinary frequency, diarrhea, vomiting, salivation, bradycardia (slow heart rate)","Diarrhea, runny nose, muscle aches, abdominal cramping, and mydriasis (dilated pupils)"],a:0,
   e:"Serotonin syndrome triad: mental status changes, autonomic hyperactivity, neuromuscular abnormalities. Note: option B describes NMS, C describes cholinergic toxicity, D describes opioid withdrawal.",src:"Q4"},
  {q:"Which foods should be avoided in a tyramine-restricted diet?",
   o:["Green leafy vegetables, chicken, and milk","Grapefruit juice, tuna, and squash","Fava beans, sauerkraut, and aged cheese","Whole grains, red meats, and carbonated soda"],a:2,
   e:"MAOI patients must avoid tyramine-rich foods: aged cheese, fava beans, sauerkraut, cured meats, soy.",src:"Q4"},
  {q:"Serotonin Syndrome results when high serotonin levels accumulate in the body. What is the greatest risk for developing Serotonin Syndrome?",
   o:["High dose range of an antidepressant","Abrupt discontinuation of an antidepressant","Long-term treatment with an antidepressant","Taking two or more antidepressants together"],a:3,
   e:"Combining serotonergic agents (e.g., SSRI + MAOI, SSRI + tramadol) is the biggest risk factor.",src:"Q4"},
  {q:"Identify the symptoms of a hypertensive crisis:",
   o:["Lethargy, facial edema, vomiting, and yellowing of the skin","Electric shock, vertigo, chills, and myalgia","Explosive headache, elevated blood pressure, fever, and diaphoresis","Fever, muscle rigidity, shivering, and confusion"],a:2,
   e:"Hypertensive crisis (often MAOI + tyramine): explosive occipital headache, severe HTN, fever, sweating.",src:"Q4"},
  {q:"Benzodiazepines potentiate the effects of this neurotransmitter?",
   o:["Glutamate","Glycine","Glutathione","GABA"],a:3,
   e:"Benzos are GABA-A receptor positive allosteric modulators → ↑Cl⁻ influx → CNS inhibition.",src:"Q4"},
  {q:"Patients with comorbid depression who are treated with sedatives should be closely monitored for the risk of _______?",
   o:["Mania","Psychosis","Suicide","Agitation"],a:2,
   e:"Sedatives + depression = elevated suicide risk. Disinhibition + lethal overdose potential.",src:"Q4"},
  {q:"Benzodiazepines should not be abruptly discontinued after long-term usage due to the risk of _______?",
   o:["Rebound Anxiety","Delirium Tremens","Diaphoresis","Withdrawal Seizures"],a:3,
   e:"Benzo withdrawal can cause life-threatening seizures (similar to alcohol withdrawal — both GABAergic).",src:"Q4"},
  {q:"Discontinuation Syndrome occurs more frequently in the following antidepressants:",
   o:["Antidepressants with a short half-life","Antidepressants with a long half-life","MAOIs","SNRIs"],a:0,
   e:"Short half-life = rapid drop in serum levels → discontinuation syndrome (Paxil/Effexor are notorious).",src:"Q4"},
  {q:"Hypertensive crisis and possible death can occur when MAOIs are combined with certain medications. Which medications are contraindicated?",
   o:["OTC cold medications","Anticonvulsants","Antibiotics","Antifungals"],a:0,
   e:"OTC decongestants (pseudoephedrine, phenylephrine) + MAOI → hypertensive crisis.",src:"Q4"},
  {q:"SNRIs are effective in the treatment of depression and _______?",
   o:["Opiate withdrawal","Sexual dysfunction","Bipolar disorder","Chronic Pain"],a:3,
   e:"SNRIs (duloxetine, venlafaxine) are FDA-approved for chronic pain — neuropathic, fibromyalgia.",src:"Q4"},

  // QUIZ 5
  {q:"When do you start to see nicotine withdrawal?",
   o:["2-4 hours","12 hours","24-48 hours","72-96 hours"],a:0,
   e:"Acute nicotine withdrawal symptoms BEGIN within ~2 hours of quitting. Per lecture: symptoms then PEAK at 24–48 hours and decline over the next 10 days to several weeks. Dysphoria/anhedonia can linger for months.",src:"Q5"},
  {q:"Medications for smoking cessation:",
   o:["Methadone and Suboxone","Chantix and Wellbutrin","Naltrexone and Antabuse","Clonidine and Buspirone"],a:1,
   e:"Chantix (varenicline, partial nicotinic agonist) and Wellbutrin/Zyban (bupropion, NDRI) are the two FDA-approved smoking cessation medications.",src:"Q5"},
  {q:"Rapid-acting detox medications for opioid use:",
   o:["Methadone and Buprenorphine","Vivitrol and Antabuse","Narcan and Clonidine","Suboxone and Wellbutrin"],a:2,
   e:"Rapid Anesthesia-Aided Detoxification uses Narcan (naloxone)/Naltrexone + Clonidine IV under general anesthesia. Patient tolerates high antagonist doses while unconscious.",src:"Q5"},
  {q:"Which opiate receptor primarily mediates the somatic responses to opioids (analgesia, euphoria, respiratory depression, miosis)?",
   o:["Kappa","Delta","Sigma","Mu"],a:3,
   e:"Mu (μ) receptors mediate the somatic effects: analgesia, euphoria, sedation, respiratory depression, miosis, and constipation. This is also the receptor naloxone targets to reverse overdose.",src:"Q5"},
  {q:"Which medication is given to treat the diarrhea component of opiate withdrawal?",
   o:["Promethazine","Loperamide","Dicyclomine","Benadryl (diphenhydramine)"],a:1,
   e:"Loperamide (Imodium) — itself a peripheral mu-agonist that doesn't cross the BBB — treats opiate withdrawal diarrhea. Per lecture symptomatic relief: Vomiting → Promethazine; Diarrhea → Loperamide; Abdominal cramping → Dicyclomine; Irritability → Benzodiazepine; Nasal sniffles → Benadryl.",src:"Q5"},
  {q:"What was promoted as the '5th vital sign' — a screening practice that contributed to the opioid epidemic?",
   o:["Blood glucose level","Pain","Body temperature variability","Sleep quality"],a:1,
   e:"PAIN was designated the '5th vital sign' (after temp, pulse, respirations, BP) starting in the late 1990s. The mandate to screen and aggressively treat pain — combined with reassurances that opioids were not addictive — drove the prescribing surge that fueled the opioid epidemic.",src:"Q5"},
  {q:"What is the most common cause of death in opioid/opiate overdose?",
   o:["Cardiac arrest from arrhythmia","Respiratory failure","Massive hemorrhage","Hyperthermia"],a:1,
   e:"Opioid overdose kills via RESPIRATORY FAILURE — opioids decrease the brainstem's sensitivity to carbon dioxide, suppressing respiratory drive. Respirations <12/min suggest acute intoxication. The full toxicity triad: miosis, stupor/coma, respiratory depression.",src:"Q5"},
  {q:"Which of the following is a sign or symptom of opiate withdrawal?",
   o:["Pinpoint pupils and respiratory depression","Vomiting, clammy skin, nasal sniffles, diarrhea, goose bumps, and restless legs","Hyperthermia and muscle rigidity","Sedation and bradycardia"],a:1,
   e:"Opiate withdrawal symptoms: vomiting, clammy skin, nasal sniffles (rhinorrhea), diarrhea, irritability, agitation, leg muscle rubbing, goose bumps (piloerection), restless legs, flu-like body aches, abdominal cramping. Note: option A describes opioid TOXICITY, not withdrawal — they are opposites.",src:"Q5"},
  {q:"What dose of nicotine is considered fatal in an adult?",
   o:["6 mg","60 mg","600 mg","6 grams"],a:1,
   e:"60 mg of nicotine can be fatal in an adult — death by RESPIRATORY FAILURE (paralysis of the muscles that control breathing). Toxicity occurs via inhalation, swallowing tobacco/vape products, or skin absorption. The first-pass effect can slow absorption by triggering vomiting.",src:"Q5"},
  {q:"Which clinical tool helps predict a patient's risk for alcohol withdrawal severity and Delirium Tremens (DTs)?",
   o:["CAGE Questionnaire","AUDIT Score","Clinical Institute Withdrawal Assessment for Alcohol (CIWA-Ar)","Beers Criteria"],a:2,
   e:"CIWA-Ar (Clinical Institute Withdrawal Assessment for Alcohol, revised) stratifies risk for mild, moderate, severe withdrawal, and possible DTs. Heavy steady drinkers have the highest seizure/DT risk. CAGE and AUDIT are screening tools for alcohol use disorder, not withdrawal severity. Beers Criteria = inappropriate meds in elderly.",src:"Q5"},
  {q:"What medication is the standard of care given to pregnant women with active opioid addiction?",
   o:["Naltrexone (Vivitrol)","Methadone","Naloxone (Narcan)","Disulfiram (Antabuse)"],a:1,
   e:"METHADONE maintenance is the standard of care for pregnant women with active opiate addiction. Untreated opiate withdrawal stress can cause miscarriage, preterm labor, fetal distress, or fetal demise. Buprenorphine is also being considered as emerging evidence supports it (lower overdose risk, fewer drug interactions, outpatient option) — but methadone remains the established standard.",src:"Q5"},
  {q:"What two drugs are administered intravenously under general anesthesia for rapid opioid detoxification?",
   o:["Methadone and buprenorphine","Suboxone and Antabuse","Narcan/Naltrexone and clonidine","Vivitrol and Wellbutrin"],a:2,
   e:"Rapid Anesthesia-Aided Detoxification: NARCAN/NALTREXONE + CLONIDINE given IV while patient is under general anesthesia (4–6 hours). The rationale is to allow the patient to tolerate high antagonist doses while unconscious. Should be performed by a trained anesthesiologist. Useful for detox-phobic patients. Per professor's slide note: 'for rich' (referring to cost). Same drug pair as the rapid-acting detox question — this stem just adds the anesthesia delivery context.",src:"Q5"}
];

// =================== UNKNOWN POOL (built from lecture PDFs - topics list) ===================
// Sourced strictly from Alcohol_Cannabis_Nicotine.pdf, Cocaine/Meth.pdf, opiates.pdf, Depression.pdf, Anxiety.pdf, Bipolar.pdf
const UNKNOWN = [
  // EPS / DRUG-INDUCED MOVEMENT DISORDERS
  {q:"A patient on haloperidol for 3 weeks presents with shuffling gait, mask-like face, cogwheel rigidity, and a resting tremor. The MOST appropriate intervention is:",
   o:["Switch to clozapine immediately and discontinue all anticholinergics","Add benztropine and consider lowering the haloperidol dose","Add propranolol and order MRI to rule out idiopathic Parkinson's","Discontinue haloperidol abruptly and start lithium"],a:1,topic:"EPS",
   e:"Drug-induced parkinsonism (pseudoparkinsonism) appears 5–30 days after antipsychotic initiation. First-line: <strong>anticholinergic (benztropine, trihexyphenidyl)</strong> ± dose reduction or switch to lower-D2-affinity agent. Clozapine is reserved for treatment-resistant cases or severe TD; abrupt discontinuation can cause cholinergic rebound; propranolol is for akathisia, not parkinsonism."},
  {q:"Akathisia is most accurately distinguished from anxiety in a patient on a first-generation antipsychotic by:",
   o:["The presence of subjective inner restlessness with observable inability to sit still, often accompanied by pacing or marching in place","A SUDS rating above 7 with associated worry","Resolution with cognitive-behavioral techniques alone","Improvement with increased dosing of the antipsychotic"],a:0,topic:"EPS",
   e:"Akathisia = subjective restlessness + objective motor manifestation (pacing, marching, leg-rocking). It's frequently misdiagnosed as anxiety/agitation, leading to disastrous DOSE INCREASES of the offending agent that worsen symptoms. First-line: propranolol; alternatives: benztropine, lorazepam, dose reduction. Akathisia is associated with increased suicidality."},
  {q:"Drug-induced parkinsonism typically appears within what timeframe of antipsychotic initiation, and what is its mechanism?",
   o:["Hours to 24 hours; from cholinergic rebound","5–30 days; from D2 receptor blockade in the nigrostriatal pathway","3–6 months; from serotonergic dysregulation","Years; from cumulative dopamine receptor sensitization"],a:1,topic:"EPS",
   e:"Drug-induced parkinsonism appears 5–30 days after starting antipsychotic via D2 blockade in the nigrostriatal pathway (the same pathway lost in idiopathic Parkinson's). Acute dystonia = hours-days. Tardive dyskinesia = months-years (D2 supersensitivity). Distinguishing onset is a high-yield clinical decision point."},
  {q:"A 58-year-old patient on long-term haloperidol develops persistent lip-smacking and tongue protrusion. Six months after stopping the medication, the symptoms remain. The MOST likely explanation is:",
   o:["Acute dystonia from D2 blockade — should resolve within days","Tardive dyskinesia from D2 receptor supersensitivity — often irreversible","Drug-induced parkinsonism — will resolve with anticholinergic","Akathisia evolving into a movement disorder"],a:1,topic:"EPS",
   e:"Persistence after discontinuation is the hallmark of TARDIVE DYSKINESIA. Mechanism: chronic D2 blockade → D2 supersensitivity in the nigrostriatal pathway → involuntary orofacial-buccal-lingual movements. Risk factors: older age, female, long-duration high-potency typical antipsychotic exposure. Treatment: VMAT2 inhibitors (valbenazine, deutetrabenazine)."},

  // CLOZAPINE / SUICIDE-REDUCING MEDS
  {q:"A patient with treatment-resistant schizophrenia is started on clozapine. The required REMS-program monitoring schedule for the first six months is:",
   o:["Weekly serum lithium levels","Weekly CBC with absolute neutrophil count (ANC)","Monthly liver function tests","Annual ECG only"],a:1,topic:"Clozapine",
   e:"Clozapine REMS requires weekly CBC/ANC for the first 6 months (then biweekly × 6 mo, then monthly). Threshold for discontinuation: ANC <1500/μL (general population) or <1000/μL (BEN). Lithium has its own monitoring (Q5–7 days initially, then every 6 mo); LFTs apply to valproate; QTc monitoring applies to ziprasidone, thioridazine, IV haloperidol."},
  {q:"Among second-generation antipsychotics, clozapine is uniquely indicated for which clinical scenario?",
   o:["First-episode psychosis in adolescents to prevent progression","Treatment-resistant schizophrenia AND reduction of recurrent suicidal behavior","Acute mania as monotherapy","Major depressive disorder without psychotic features"],a:1,topic:"Clozapine",
   e:"Clozapine has TWO unique FDA indications no other antipsychotic shares: (1) treatment-resistant schizophrenia (failure of ≥2 adequate antipsychotic trials), (2) recurrent suicidal behavior in schizophrenia/schizoaffective disorder (InterSePT trial). It's third-line because of agranulocytosis, seizures, myocarditis, metabolic burden, and orthostasis — but the suicide-reduction signal is strong enough that it's considered after even one serious attempt in some protocols."},
  {q:"Which medication has the strongest evidence base for reducing suicide risk in bipolar disorder, independent of its mood-stabilizing effect?",
   o:["Valproate (Depakote)","Carbamazepine (Tegretol)","Lithium","Lamotrigine (Lamictal)"],a:2,topic:"Suicide Risk Reduction",
   e:"LITHIUM is the only mood stabilizer with robust suicide-reduction evidence in bipolar disorder, with effect size independent of mood stabilization (Baldessarini, Cipriani meta-analyses). Mechanism may involve serotonergic modulation, neurotrophic effects (BDNF, GSK-3β inhibition), and reduction of impulsive aggression. Valproate, carbamazepine, and lamotrigine have NOT shown comparable anti-suicide effects."},
  {q:"Beyond agranulocytosis, clozapine carries multiple black box warnings. Which of the following is NOT a black box warning for clozapine?",
   o:["Seizures","Myocarditis and cardiomyopathy","Tardive dyskinesia","Increased mortality in elderly with dementia-related psychosis"],a:2,topic:"Clozapine",
   e:"Clozapine has FIVE black box warnings: agranulocytosis, seizures (dose-dependent), myocarditis/cardiomyopathy, orthostatic hypotension/cardiac arrest, and increased mortality in elderly with dementia-related psychosis. Notably, clozapine has the LOWEST risk of TD among antipsychotics (no black box for it) — one reason it's used in patients who developed TD on other antipsychotics."},

  // STIMULANT-INDUCED HALLUCINATIONS
  {q:"A patient in the ED reports the sensation of insects crawling beneath the skin and presents with excoriated forearms. This presentation (formication) is most strongly associated with:",
   o:["Acute alcohol withdrawal with delirium tremens","Methamphetamine and cocaine intoxication or withdrawal","Cannabis-induced psychosis","Lewy body dementia"],a:1,topic:"Stimulant Psychosis",
   e:"Formication is the hallmark tactile hallucination of STIMULANT psychosis (meth, cocaine). The skin-picking, scarring, and 'meth mites' delusion follow. While DTs CAN produce tactile hallucinations, the classic teaching links formication specifically to stimulant intoxication. Up to 80% of patients with cocaine use disorder report psychotic symptoms; meth-induced psychotic disorder occurs in 36.5–42.7% of users."},
  {q:"The 2018 meta-analysis cited in lecture estimates what percentage of methamphetamine users develop methamphetamine-induced psychotic disorder?",
   o:["5–10%","15–25%","36.5–42.7%","Over 75%"],a:2,topic:"Stimulant Psychosis",
   e:"36.5–42.7% per the cited meta-analysis. Risk DOUBLES when meth is combined with marijuana or alcohol. Meth psychosis can be indistinguishable from primary schizophrenia and may persist for weeks-months after cessation; some patients develop persistent psychotic disorders."},

  // METH NEUROTOXICITY
  {q:"Chronic methamphetamine use causes neurotoxicity primarily by damaging which neurotransmitter systems?",
   o:["GABA-A and glycine receptors in the brainstem","Serotonin and dopamine nerve terminals","Cholinergic neurons of the basal forebrain","NMDA receptors in the hippocampus"],a:1,topic:"Meth Neurotoxicity",
   e:"Meth selectively damages SEROTONIN and DOPAMINE nerve terminals via excessive monoamine release, oxidative stress, and hyperthermia-mediated injury. Clinical correlates: anhedonia, motor slowing, executive dysfunction, parkinsonism-like features. NMDA damage is alcohol-related; cholinergic basal forebrain loss is Alzheimer's; GABA/glycine brainstem damage is stiff-person syndrome territory."},
  {q:"Which structural CNS changes are documented in chronic methamphetamine users per lecture?",
   o:["Cerebellar atrophy with frontal sparing only","11% white matter reduction, ~7% increase in neuronal death markers, 8% hippocampal volume loss, with blood-brain barrier compromise","Increased cortical thickness and white matter expansion","Isolated nucleus accumbens dopamine receptor upregulation"],a:1,topic:"Meth Neurotoxicity",
   e:"Per lecture: 11% white matter reduction, 7% increase in neuronal death/scar tissue, 8% hippocampal tissue loss, plus blood-brain barrier damage. Brain hyperthermia (meth raises core temperature) potentiates the neuronal injury. These changes correlate with persistent cognitive deficits even after prolonged abstinence."},
  {q:"The newer P2P (phenyl-2-propanone) form of methamphetamine that resurfaced post-2021 differs from older ephedrine-based meth in producing:",
   o:["Lower potency and milder psychiatric effects","Faster, more severe brain damage with violent paranoia, conspiracy delusions, and dramatic memory loss","Cardiac toxicity without CNS effects","No psychiatric symptoms"],a:1,topic:"Meth Neurotoxicity",
   e:"P2P meth (Mexican cartel synthesis post-DEA ephedrine restrictions) produces faster, steeper neuropsychiatric deterioration: violent paranoia, hallucinations, conspiracy theories, social withdrawal/isolation, massive memory loss, and disorganized speech. Sam Quinones' reporting (and the lecture) link this to a sharp rise in unhoused mentally ill populations."},

  // BLACKOUTS (ALCOHOL)
  {q:"Alcohol-induced blackouts (anterograde amnesia during intoxication) occur primarily because alcohol:",
   o:["Increases dopamine release in the prefrontal cortex, overwhelming working memory","Inhibits NMDA glutamate receptors AND suppresses transcription of memory-encoding proteins, blocking long-term potentiation","Hyperactivates the locus coeruleus, blocking encoding via norepinephrine surge","Stimulates GABA-A only at the alpha-1 subunit, inducing sedation without amnesia"],a:1,topic:"Blackouts",
   e:"Two-hit mechanism: (1) NMDA receptor inhibition (especially in hippocampus) blocks LTP — the molecular basis of memory formation; (2) suppression of memory-protein transcription prevents long-term encoding. Critically, the patient appears AWAKE and FUNCTIONAL during the blackout — this is not unconsciousness, it's failure to lay down memory. Forensic and legal implications follow: hazardous behaviors with no recall."},
  {q:"Alcohol's NMDA-receptor inhibition explains memory and motor impairment by acting on which brain regions most prominently?",
   o:["Cerebellum and brainstem only","Hippocampus, amygdala, and striatum","Prefrontal cortex in isolation","Thalamic relay nuclei only"],a:1,topic:"Blackouts",
   e:"Alcohol inhibits NMDA glutamate receptors most prominently in HIPPOCAMPUS (memory encoding/LTP), AMYGDALA (emotional learning), and STRIATUM (motor coordination, procedural memory). This regional pattern explains why blackouts pair with motor incoordination and emotional dysregulation."},

  // PREDNISONE / STEROID PSYCH SYMPTOMS
  {q:"A patient on a 60mg/day prednisone burst for an autoimmune flare presents with new pressured speech, decreased sleep need, and grandiosity. The MOST likely explanation is:",
   o:["Unmasking of underlying bipolar I disorder unrelated to the steroid","Steroid-induced mania/psychosis — a high-dose, dose-dependent corticosteroid effect","Serotonin syndrome from a drug interaction","Anticholinergic delirium from premedications"],a:1,topic:"Prednisone Psych",
   e:"Steroid-induced mania/psychosis is dose-dependent (risk rises sharply >40 mg prednisone equivalent) and typically appears in the first 1–2 weeks. Treatment: taper steroid if possible, add antipsychotic acutely. During the TAPER, watch for steroid-induced depression. Always consider iatrogenic causes in new psychiatric presentations — an unmasked primary disorder is a diagnosis of exclusion."},
  {q:"Which class of substances is recognized in the anxiety lecture as a frequent cause of medication- or substance-INDUCED anxiety symptoms?",
   o:["Beta-blockers and ACE inhibitors","Bronchodilators (albuterol, theophylline), decongestants (pseudoephedrine), corticosteroids, stimulants, caffeine, and nicotine","Statins and proton-pump inhibitors","Anticoagulants and antiplatelets"],a:1,topic:"Prednisone Psych",
   e:"Lecture's iatrogenic anxiety list: bronchodilators (β-agonists, theophylline), decongestants (pseudoephedrine, phenylephrine), corticosteroids, thyroid hormones, stimulants, antivirals (interferon), antihistamines (especially in children — paradoxical activation), caffeine, Ma Huang/ephedra, ginkgo, nicotine. Beta-blockers, statins, ACE inhibitors, PPIs, and anticoagulants are NOT typical anxiety inducers."},

  // LITHIUM TOXICITY
  {q:"A 65-year-old woman stable on lithium 900mg/day presents with new-onset coarse tremor, ataxia, and confusion. She started a new medication yesterday for hypertension. Which agent most likely precipitated her toxicity?",
   o:["Hydrochlorothiazide (thiazide diuretic)","Amlodipine (calcium channel blocker)","Losartan (ARB) — the only option without lithium interaction","Spironolactone (potassium-sparing diuretic)"],a:0,topic:"Lithium Toxicity",
   e:"THIAZIDES are classic lithium-elevators — they reduce sodium and increase proximal tubule lithium reabsorption. Other major precipitants: NSAIDs, ACE inhibitors, dehydration, low-sodium diet. Amlodipine and ARBs are generally safer choices. Spironolactone has variable effects. The narrow therapeutic index (0.6–1.2 mEq/L) means small changes in clearance produce big serum-level swings."},
  {q:"Acute lithium toxicity is most reliably distinguished from chronic toxicity by which clinical pattern?",
   o:["Acute toxicity prominently features GI symptoms (vomiting, diarrhea) with later neuro signs; chronic toxicity presents primarily with neurologic findings (tremor, confusion, ataxia) at lower serum levels","Acute toxicity always presents with seizures","Chronic toxicity is asymptomatic until cardiac arrest","Both present identically with respiratory failure"],a:0,topic:"Lithium Toxicity",
   e:"Acute toxicity (large overdose in a Li-naive patient) leads with GI: vomiting, diarrhea → followed by ataxia, tremor, confusion. Chronic toxicity (gradual accumulation in a stable patient via dehydration, NSAIDs, thiazides, decreased renal function) leads with NEURO findings — often at deceptively 'normal' serum levels. Treatment: hold drug, hydrate; severe (level >2.5 or symptomatic) → hemodialysis."},

  // ACUTE ALCOHOL WITHDRAWAL
  {q:"Which of the following clinical features distinguishes severe alcohol withdrawal from severe opioid withdrawal?",
   o:["Risk of grand mal seizures and delirium tremens — opioid withdrawal, while miserable, is rarely life-threatening","Diarrhea and vomiting, which are absent in alcohol withdrawal","Lacrimation and rhinorrhea, which only occur in alcohol withdrawal","Pupillary constriction, which is unique to alcohol withdrawal"],a:0,topic:"Alcohol Withdrawal",
   e:"Critical clinical distinction: ALCOHOL withdrawal can KILL via seizures, stroke (CVA), or DTs. OPIOID withdrawal is profoundly uncomfortable (vomiting, diarrhea, lacrimation, rhinorrhea, piloerection, mydriasis, abdominal cramping) but rarely fatal in healthy adults. This drives treatment urgency: alcohol withdrawal warrants benzodiazepine prophylaxis on admission; opioid withdrawal can be managed symptomatically (loperamide, clonidine, etc.) or with buprenorphine/methadone."},
  {q:"A patient 48 hours post-cessation of heavy daily drinking develops fever (101.8°F), tachycardia (132 bpm), confusion, agitation, diaphoresis, and visual hallucinations. The diagnosis and immediate priority are:",
   o:["Acute manic episode — start lithium and antipsychotic","Delirium tremens — IV benzodiazepines, fluid resuscitation, thiamine, electrolyte correction in monitored setting","Serotonin syndrome — discontinue all serotonergic agents","Alcohol intoxication — observation only"],a:1,topic:"Alcohol Withdrawal",
   e:"Classic DT presentation: 24–72 hours post-cessation, autonomic hyperactivity (fever, tachycardia, hypertension, diaphoresis), profound confusion, hallucinations (often visual or tactile), agitation. Mortality 5–15% even with treatment. Required: ICU/step-down monitoring, IV benzodiazepines (lorazepam, diazepam), aggressive thiamine BEFORE glucose (prevent Wernicke's), magnesium, folate, fluid resuscitation."},
  {q:"Delirium tremens typically begins within what timeframe after the last drink, and which patients are at HIGHEST risk?",
   o:["1–6 hours; first-time drinkers","24–72 hours; heavy steady drinkers with prior withdrawal episodes (kindling)","1–2 weeks; binge drinkers only","30+ days; only patients with end-stage liver disease"],a:1,topic:"Alcohol Withdrawal",
   e:"Onset: 24–72 hours post-cessation. Highest-risk patients: chronic heavy daily drinkers, prior withdrawal episodes (KINDLING phenomenon — each withdrawal lowers seizure threshold for the next), older age, comorbid medical illness, electrolyte derangements. Earlier withdrawal phenomena: tremor/anxiety at 6–12 hr; alcoholic hallucinosis at 12–24 hr; withdrawal seizures at 24–48 hr."},

  // FASD (ALL 4)
  {q:"Per the FASD umbrella lecture slide, which four conditions are recognized under the FASD umbrella?",
   o:["FAS, pFAS, ARND, and ARBD","FAS, autism spectrum disorder, ADHD, and ODD","FAS and three subtypes of cerebral palsy","FAS, Down syndrome, fragile X, and Williams syndrome"],a:0,topic:"FASD",
   e:"FASD umbrella per lecture: <strong>FAS</strong> (Fetal Alcohol Syndrome — full triad), <strong>pFAS</strong> (Partial FAS — some features but not full criteria), <strong>ARND</strong> (Alcohol-Related Neurodevelopmental Disorder — CNS/cognitive without facial features), <strong>ARBD</strong> (Alcohol-Related Birth Defects — physical malformations: cardiac/renal/skeletal). ND-PAE is referenced as a screening tool/category. Crucial: FASD is FREQUENTLY misdiagnosed as ADHD."},
  {q:"The diagnostic triad for full Fetal Alcohol Syndrome (FAS) requires evidence of:",
   o:["Pre/postnatal growth deficiency, characteristic craniofacial abnormalities (short palpebral fissures, smooth philtrum, thin upper lip, microcephaly), AND CNS dysfunction/intellectual disability","Confirmed maternal drinking history alone — no physical findings required","Microcephaly alone, in any child of a drinking mother","Behavioral problems and ADHD-like presentation"],a:0,topic:"FASD",
   e:"FAS diagnostic triad (CDC): (1) growth deficiency (<10th percentile, prenatal or postnatal), (2) craniofacial features — SHORT palpebral fissures, SMOOTH philtrum, THIN upper lip, microcephaly, (3) CNS dysfunction/intellectual disability. Often accompanied by ventricular septal defect and limb dislocations. FAS is the leading PREVENTABLE cause of intellectual disability in the US. Maternal drinking confirmation is supportive but the diagnosis rests on these criteria."},
  {q:"What percentage of individuals with FASD are estimated to remain UNDIAGNOSED, and what is the most common misdiagnosis?",
   o:["Approximately 5%; misdiagnosed as Down syndrome","Approximately 95%; frequently misdiagnosed as ADHD","Approximately 50%; misdiagnosed as autism spectrum disorder","Less than 1%; rarely missed clinically"],a:1,topic:"FASD",
   e:"95% of people with FASD are UNDIAGNOSED — a public health failure. Frequently misdiagnosed as ADHD (and stimulants ARE actually used in FASD per lecture, alongside anticonvulsants, but the diagnosis matters for educational supports, services, and family counseling). Most diagnosed around age 6. Outcomes if undiagnosed/unsupported: 61% school disruptions, 60% legal involvement, 73–80% of FAS kids in foster/adoptive placement."},
  {q:"Which neuroanatomic findings are characteristic of FASD on imaging or autopsy?",
   o:["Selective hippocampal sclerosis without other findings","Partial or complete agenesis of the corpus callosum, frontal cortex/hippocampal damage, and cerebellar hypoplasia","Lewy bodies in the substantia nigra","Demyelinating plaques in periventricular white matter"],a:1,topic:"FASD",
   e:"FASD brain damage is PERMANENT and includes: partial/complete <strong>agenesis of the corpus callosum</strong> (associated with intellectual disability + seizures), <strong>frontal cortex and hippocampal damage</strong> (memory + executive function + communication deficits), <strong>cerebellar hypoplasia</strong> (motor coordination + balance issues). Hippocampal sclerosis = mesial temporal lobe epilepsy; Lewy bodies = Parkinson's/LBD; periventricular plaques = MS."},

  // BINGE DRINKING
  {q:"Per CDC criteria cited in lecture, binge drinking is operationally defined as:",
   o:["Daily drinking of any amount for >30 consecutive days","Women: 4+ drinks in 2–3 hours; Men: 5+ drinks in 2–3 hours","Any single intoxication event reaching the legal limit","Drinking that causes any social impairment, regardless of quantity"],a:1,topic:"Binge Drinking",
   e:"CDC binge drinking definition: Women 4+ in 2–3 hr; Men 5+ in 2–3 hr (thresholds that approximate a BAC of 0.08%). This is DISTINCT from 'heavy drinking' (15+/wk men, 8+/wk women) and from 'alcohol use disorder' (DSM-5 criteria). ~38 million US adults binge drink ~4 times/month per CDC."},
  {q:"Monthly binge drinking in midlife is associated with which long-term outcome per lecture?",
   o:["No documented long-term cognitive consequences","A doubling of long-term cognitive impairment risk later in life","Improved hippocampal volume on MRI","Reduced risk of late-onset Alzheimer's"],a:1,topic:"Binge Drinking",
   e:"Monthly midlife binge drinking DOUBLES long-term cognitive impairment risk. Mechanisms: repeated NMDA dysregulation, hippocampal injury, neuroinflammation, vascular contributions. Alcohol poisoning kills ~6 people/day in the US. Binge drinking in pregnancy → FASD spectrum risk."},

  // ANTABUSE
  {q:"Antabuse (disulfiram) produces its aversive effect via which mechanism?",
   o:["Antagonism at mu opioid receptors","Inhibition of acetaldehyde dehydrogenase (ALDH), causing accumulation of toxic acetaldehyde when alcohol is consumed","Partial agonism at GABA-A receptors","Inhibition of monoamine oxidase B"],a:1,topic:"Antabuse",
   e:"Disulfiram irreversibly inhibits ALDH, the enzyme that converts acetaldehyde → acetate during ethanol metabolism. Acetaldehyde buildup produces flushing, throbbing headache, nausea/vomiting, dyspnea, palpitations, hypotension, and dizziness. This is AVERSIVE THERAPY — full informed consent is required. Naltrexone (Vivitrol) is the mu antagonist; benzodiazepines = GABA modulators; selegiline = MAO-B inhibitor."},
  {q:"A patient on disulfiram (Antabuse) reports flushing and nausea after using mouthwash. Patient education should include avoidance of alcohol-containing items for what duration after the LAST disulfiram dose?",
   o:["Only while actively taking the medication; can resume immediately upon discontinuation","2 weeks after the last dose, due to disulfiram's prolonged enzyme inhibition","6 months after the last dose","Lifelong avoidance is required"],a:1,topic:"Antabuse",
   e:"Disulfiram's ALDH inhibition is IRREVERSIBLE — recovery requires synthesis of new enzyme, which takes ~2 weeks. Avoid alcohol-containing items (vinegar, mouthwash, aftershave, perfumes, cough medication, communion wine, hand sanitizer in some preparations) during therapy AND for 2 weeks after stopping. Caution: disulfiram may induce mania in bipolar disorder."},
  {q:"Before initiating disulfiram (Antabuse), the patient must be alcohol-free for at least:",
   o:["1 hour","12 hours","1 week","30 days"],a:1,topic:"Antabuse",
   e:"Patient must be alcohol-free ≥12 hours before starting disulfiram to avoid an immediate severe reaction. Other prerequisites: full informed consent (this is aversive therapy), baseline LFTs (hepatotoxicity risk), psychiatric stability (caution in bipolar — may precipitate mania), and patient motivation/ability to consent."},

  // CLONIDINE
  {q:"Clonidine (Catapres) is pharmacologically classified as:",
   o:["A beta-1 selective antagonist","A presynaptic alpha-2 adrenergic agonist that decreases sympathetic outflow","A non-selective alpha-1/alpha-2 antagonist","A direct serotonin 1A partial agonist"],a:1,topic:"Clonidine",
   e:"Clonidine is a presynaptic alpha-2 agonist. Stimulating presynaptic α2 receptors REDUCES norepinephrine release from the locus coeruleus → decreased sympathetic outflow. This explains its use in hypertension, ADHD, opioid withdrawal (suppresses autonomic storm), PTSD prophylaxis, and akathisia. Beta-1 antagonists = metoprolol/atenolol; α1/α2 antagonist = phenoxybenzamine; 5-HT1A partial agonist = buspirone."},
  {q:"A patient stops clonidine abruptly after 6 months of use for ADHD. The MOST dangerous consequence is:",
   o:["Gradual symptom rebound over 4–6 weeks with no acute risk","Rebound hypertensive crisis with potential for stroke — particularly dangerous if patient is also on a beta-blocker","Hypotensive crisis from continued sympathetic suppression","Acute serotonin syndrome"],a:1,topic:"Clonidine",
   e:"Abrupt clonidine discontinuation = rebound hypertension, agitation, tachycardia → STROKE risk. Mechanism: chronic α2 stimulation → receptor downregulation → sudden withdrawal unmasks unopposed sympathetic surge. Risk is AMPLIFIED with concurrent beta-blocker (unopposed α-mediated vasoconstriction). Always TAPER over days. This is the same physiology behind 'pheo crisis' management."},
  {q:"Clonidine's role in opioid withdrawal protocols is best explained by:",
   o:["Direct mu receptor agonism, replacing the opioid","Reduction of sympathetic outflow from the locus coeruleus, suppressing autonomic withdrawal symptoms (sweating, tachycardia, lacrimation, rhinorrhea)","Increased respiratory drive via medullary stimulation","Direct dopamine release in the nucleus accumbens, restoring reward signaling"],a:1,topic:"Clonidine",
   e:"Opioids tonically suppress locus coeruleus firing. Withdrawal → LC hyperactivity → autonomic storm (sweating, tachycardia, lacrimation, rhinorrhea, anxiety). Clonidine's α2 agonism inhibits LC firing — quieting the autonomic symptoms WITHOUT reactivating mu receptors (so it doesn't perpetuate dependence). Used in rapid anesthesia-aided detox alongside naltrexone."},

  // VIVITROL (NALTREXONE)
  {q:"Vivitrol (extended-release naltrexone) reduces alcohol consumption primarily by:",
   o:["Inhibiting acetaldehyde dehydrogenase, producing aversive flushing","Acting as a competitive opioid antagonist that blocks endogenous opioid-mediated reward signaling triggered by alcohol","Producing sedation that prevents drinking behavior","Substituting for alcohol at GABA-A receptors"],a:1,topic:"Vivitrol",
   e:"Naltrexone is a competitive mu-opioid antagonist. Alcohol triggers endogenous opioid (β-endorphin) release in the ventral tegmental area/nucleus accumbens reward pathway; blocking this attenuates the euphoric/reinforcing effect, reducing craving and consumption (Sinclair Method). Disulfiram = ALDH inhibitor; benzos = GABA modulators. Vivitrol is particularly useful for binge drinkers and patients targeting moderation rather than complete abstinence."},
  {q:"A patient with opioid use disorder is being considered for Vivitrol (XR naltrexone). Which assessment is REQUIRED before the first injection?",
   o:["Liver biopsy and genetic testing","Documented opioid-free interval of 7–10 days, naloxone challenge test, and negative urine drug screen","HIV testing and chest X-ray","Polysomnography to rule out sleep apnea"],a:1,topic:"Vivitrol",
   e:"Vivitrol must NOT be given to anyone with recent opioid use — naltrexone will displace bound opioids and PRECIPITATE severe withdrawal in a depot-injection form (irreversible for ~30 days). Required: 7–10 days opioid-free, naloxone challenge (no withdrawal response), negative UDS. Counsel patients that any future opioid analgesia will be ineffective during therapy and they should stop the med 36 hours before elective surgery."},
  {q:"Long-term Vivitrol therapy requires monitoring for which adverse effect cluster?",
   o:["Weight gain and hyperglycemia","Depression, suicidality, anhedonia/apathy, and severe injection-site reactions (sometimes requiring surgical debridement)","QT prolongation and torsades","Tardive dyskinesia"],a:1,topic:"Vivitrol",
   e:"Naltrexone blocks endogenous opioid signaling — patients can develop apathy, anhedonia, or worsening depression because the body's natural reward circuitry is dampened. Monitor mood/suicidality at every visit. Injection-site reactions (cellulitis, abscess, hematoma, necrosis) can be severe and rarely require surgery. Cost is significant (~$1,294/vial monthly), which limits real-world access."},

  // COCAINE WITHDRAWAL IN BABIES
  {q:"Per lecture, what proportion of infants born to mothers using cocaine during pregnancy experience neonatal withdrawal symptoms?",
   o:["Less than 1% — cocaine does not produce neonatal withdrawal","Approximately 1/3 (~33%) of cocaine-exposed neonates","Approximately 75%","All cocaine-exposed neonates show withdrawal"],a:1,topic:"Cocaine in Babies",
   e:"~1/3 of babies born to cocaine-using mothers experience withdrawal symptoms. Separately, up to 40% of cocaine-exposed infants show congenital anomalies, brain malformation, or cardiovascular abnormalities. Compare to opioid-exposed neonates: 60–80% develop NAS (Neonatal Abstinence Syndrome) — a much higher rate, reflecting opioids' more direct dependence physiology."},
  {q:"A neonate born to a mother with active cocaine use disorder presents with seizures, hyperactive reflexes, vomiting, lethargy, and high-pitched crying. This presentation is MOST consistent with:",
   o:["Neonatal opioid withdrawal (NAS)","Cocaine-exposed neonate withdrawal","Maternal hypoglycemia transmitted in utero","Group B Streptococcus sepsis"],a:1,topic:"Cocaine in Babies",
   e:"Cocaine-exposed neonate withdrawal: <strong>seizures, lethargy, hyperactive reflexes, vomiting, high-pitched crying, restlessness</strong>. Note overlap with neonatal opioid withdrawal (NAS) — both feature high-pitched crying, hyperactive reflexes, GI symptoms — but NAS classically adds yawning, sneezing, sweating, and tremor with a more predictable Finnegan score progression. Sepsis must always be ruled out (work-up: CBC, blood cultures, LP). Maternal substance use history is the key differentiator."},

  // PROPRANOLOL (BETA-BLOCKER)
  {q:"Propranolol is most commonly used in psychiatry for which two indications?",
   o:["Treatment-resistant depression and bipolar maintenance","Performance anxiety (situational) and antipsychotic-induced akathisia","First-line for generalized anxiety disorder and panic disorder","Acute psychosis and tardive dyskinesia"],a:1,topic:"Propranolol",
   e:"Propranolol's psych uses: (1) <strong>performance/situational anxiety</strong> — blocks peripheral β-mediated symptoms (tachycardia, tremor, sweating, voice quiver) without sedation or cognitive blunting; (2) <strong>akathisia</strong> — first-line for antipsychotic-induced motor restlessness. NOT first-line for generalized anxiety (SSRIs/SNRIs) or panic disorder (SSRIs ± benzos). NOT antipsychotic. NOT effective for TD."},
  {q:"A 28-year-old patient with type 1 diabetes and mild persistent asthma asks about propranolol for stage fright before a wedding toast. The MOST appropriate response is:",
   o:["Prescribe propranolol — it has minimal effect on asthma or glucose","Decline propranolol — non-selective β-blockade can precipitate bronchospasm AND mask hypoglycemia awareness; consider a different intervention","Prescribe propranolol but only at half the standard dose","Prescribe a benzodiazepine instead, with no further questions"],a:1,topic:"Propranolol",
   e:"Two clinically important contraindications coexist here: (1) ASTHMA/COPD — non-selective β2 blockade triggers bronchoconstriction; (2) DIABETES — propranolol blunts the sympathetic warning signs of hypoglycemia (tachycardia, tremor) AND impairs hepatic gluconeogenesis. Other cautions: bradycardia, AV block, peripheral vascular disease, competitive endurance athletes (limits cardiac output). Alternatives: low-dose lorazepam, β1-selective agents, or non-pharm strategies."},
  {q:"Beyond psychiatric uses, propranolol is indicated for which medical conditions per the anxiety lecture?",
   o:["Acute MI prophylaxis only","Chest pain/coronary artery disease, migraine prophylaxis, essential tremor, and rate control","Type 2 diabetes management","Acute angle-closure glaucoma"],a:1,topic:"Propranolol",
   e:"Medical uses listed: chest pain/CAD, migraine prophylaxis, essential tremor, rate control. CRITICAL pearl: TAPER over several weeks at discontinuation to avoid rebound hypertension and rebound tachyarrhythmia (β-receptor upregulation occurs during chronic blockade). Acute glaucoma uses topical β-blockers (timolol), not systemic propranolol."},

  // MJ AND SCHIZOPHRENIA
  {q:"Per the Swedish cohort study referenced in lecture, heavy cannabis use by age 18 was associated with what increased risk of subsequent schizophrenia?",
   o:["No significant association after controlling for confounders","Approximately 2-fold","Approximately 6-fold","Approximately 100-fold"],a:2,topic:"MJ & Schizophrenia",
   e:"The Swedish conscript cohort (Andréasson et al., 1987) showed heavy cannabis users by age 18 had ~6× increased risk of schizophrenia. Replicated in New Zealand Dunedin cohort. Risk increases with: earlier age of onset, higher potency, more frequent use, COMT Val158Val genotype. Causality vs. self-medication remains debated, but the dose-response and temporal relationships support a causal contribution in vulnerable individuals."},
  {q:"High-potency cannabis (e.g., contemporary THC concentrates >15% THC) is associated with what increased likelihood of receiving a psychotic disorder diagnosis compared to non-users?",
   o:["No increased likelihood","2-fold higher probability","5-fold higher probability","No data exists on this question"],a:2,topic:"MJ & Schizophrenia",
   e:"Per lecture (Di Forti et al. studies): high-potency cannabis = ~5× higher probability of psychotic disorder diagnosis vs. non-users. Modern cannabis is dramatically more potent than products studied in the 1970s–80s (mean THC has risen from ~3% to >15%; concentrates can exceed 80%), and CBD content has dropped — CBD may be partly protective against THC-induced psychotomimetic effects."},
  {q:"Methamphetamine alone is associated with a 5-fold increased risk of psychosis; this risk approximately DOUBLES when meth is combined with which substances per lecture?",
   o:["Caffeine and nicotine","Marijuana or alcohol","Antidepressants only","Acetaminophen"],a:1,topic:"MJ & Schizophrenia",
   e:"Per lecture: meth alone = 5× psychosis risk; meth + marijuana OR meth + alcohol DOUBLES that (~10× baseline). Likely mechanisms: additive dopaminergic dysregulation (meth) + CB1-mediated cortical disinhibition (THC) or NMDA inhibition + GABAergic disruption (alcohol). Polysubstance use is the rule, not the exception, in stimulant-using populations — the synergistic psychosis risk is clinically critical."},

  // SECONDHAND SMOKE - COCAINE
  {q:"When do nicotine withdrawal symptoms PEAK after smoking cessation?",
   o:["Within 2 hours","12 hours","24-48 hours","2 weeks"],a:2,topic:"Nicotine Withdrawal",

          </button>

        <div class="stat">Session: <strong>${stats.s}</strong> seen</div>
        <div class="stat">Correct: <strong>${stats.c}</strong></div>
        <div class="stat">Best streak: <strong>${stats.bs}</strong></div>
      </div>`;
    return;
  }
  showQuestion();
}

function startQuiz(mode){
  let pool;
  if(mode==='known')pool=KNOWN.map(x=>({...x,pool:'known'}));
  else if(mode==='unknown')pool=UNKNOWN.map(x=>({...x,pool:'unknown'}));
  else pool=ALL.slice();
  // Shuffle
  for(let i=pool.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [pool[i],pool[j]]=[pool[j],pool[i]];
  }
  session.qActive=pool;
  session.qIdx=0;
  session.qMode=mode;
  showQuestion();
}

function showQuestion(){
  const q=session.qActive[session.qIdx];
  if(!q){
    document.getElementById('ct').innerHTML=`
      <div class="card" style="text-align:center">
        <h3 style="color:var(--accent2);margin-bottom:8px">Pool Complete!</h3>
        <p style="color:var(--text-dim);margin-bottom:14px">You've gone through all questions in this pool.</p>
        ${Object.keys(session.wrongTopics).length>0?`<p style="font-size:.85em;color:var(--warning);margin-bottom:14px">Topics to review: ${Object.entries(session.wrongTopics).sort((a,b)=>b[1]-a[1]).map(x=>x[0]+' ('+x[1]+')').join(', ')}</p>`:''}
        <button class="btn" onclick="session.qActive=[];session.wrongTopics={};renderQuiz()">Back to Mode Select</button>
        <button class="btn btn-sec" onclick="startQuiz(session.qMode)" style="margin-left:8px">Restart This Pool</button>
      </div>`;
    return;
  }
  const tot=session.qActive.length;
  document.getElementById('ct').innerHTML=`
    <div class="statbar">
      <div class="stat">Q <strong>${session.qIdx+1}</strong>/${tot}</div>
      <div class="stat">Correct: <strong>${stats.c}</strong></div>
      <div class="stat">Streak: <strong>${stats.st}</strong></div>
      <button class="btn btn-sec" style="font-size:.78em;padding:5px 10px;margin-left:auto" onclick="session.qActive=[];session.wrongTopics={};renderQuiz()">↩ Pools</button>
    </div>
    <div class="q-card">
      <div class="q-meta">
        <span class="q-source ${q.pool}">${q.pool==='known'?'KNOWN · '+q.src:'UNKNOWN · '+(q.topic||'')}</span>
        <span></span>
      </div>
      <div class="q-text">${q.q}</div>
      <div id="opts">
        ${q.o.map((o,i)=>`<button class="opt" onclick="ans(${i})">${o}</button>`).join('')}
      </div>
      <div id="expl"></div>
      <div id="next"></div>
    </div>`;
}

function ans(i){
  const q=session.qActive[session.qIdx];
  const opts=document.querySelectorAll('.opt');
  opts.forEach(o=>o.disabled=true);
  opts[q.a].classList.add('correct');
  stats.s++;
  if(i===q.a){
    stats.c++;
    stats.st++;
    if(stats.st>stats.bs)stats.bs=stats.st;
  }else{
    opts[i].classList.add('wrong');
    stats.st=0;
    const t=q.topic||q.src||'misc';
    session.wrongTopics[t]=(session.wrongTopics[t]||0)+1;
  }
  document.getElementById('expl').innerHTML=`<div class="expl"><strong>${i===q.a?'✓ Correct':'✗ Incorrect'}.</strong> ${q.e}</div>`;
  document.getElementById('next').innerHTML=`<div class="btn-row"><button class="btn" onclick="session.qIdx++;showQuestion()">Next →</button></div>`;
}

// =================== FLASHCARDS ===================
function renderFlash(){
  if(flash.deck.length===0){
    flash.deck=FLASH.slice();
    for(let i=flash.deck.length-1;i>0;i--){
      const j=Math.floor(Math.random()*(i+1));
      [flash.deck[i],flash.deck[j]]=[flash.deck[j],flash.deck[i]];
    }
    flash.idx=0;
    flash.flipped=false;
  }
  const c=flash.deck[flash.idx];
  if(!c){
    document.getElementById('ct').innerHTML=`
      <div class="card" style="text-align:center">
        <h3 style="color:var(--accent2);margin-bottom:8px">Deck Complete!</h3>
        <button class="btn" onclick="flash.deck=[];renderFlash()">Reshuffle Deck</button>
      </div>`;
    return;
  }
  document.getElementById('ct').innerHTML=`
    <div class="statbar">
      <div class="stat">Card <strong>${flash.idx+1}</strong>/${flash.deck.length}</div>
      <div class="stat">Topic: <strong>${c.t}</strong></div>
      ${c.mk?'<div class="stat" style="color:var(--gold)">★ Must-know</div>':''}
    </div>
    <div class="flash" onclick="flash.flipped=!flash.flipped;renderFlash()">
      <div class="lbl">${flash.flipped?'Answer':'Question'}</div>
      <div class="topic">${c.t}</div>
      ${flash.flipped?`<div class="a">${c.b}</div>`:`<div class="q">${c.f}</div>`}
      <div class="hint">${flash.flipped?'Rate yourself below':'Tap to flip'}</div>
    </div>
    ${flash.flipped?`
    <div class="rate">
      <button class="again" onclick="rate(0)">Again</button>
      <button class="hard" onclick="rate(1)">Hard</button>
      <button class="good" onclick="rate(2)">Good</button>
      <button class="easy" onclick="rate(3)">Easy</button>
    </div>`:''}`;
}

function rate(r){
  if(r===0){
    // re-insert card 3 positions later
    flash.deck.splice(flash.idx+3,0,flash.deck[flash.idx]);
  }
  flash.deck.splice(flash.idx,1);
  flash.flipped=false;
  if(flash.idx>=flash.deck.length)flash.idx=0;
  renderFlash();
}

function renderRef(){
  let cf='all';
  const tabs=[
    {k:'all',l:'All'},{k:'eps',l:'EPS'},{k:'cloz',l:'Clozapine'},{k:'stim',l:'Stim Psychosis'},
    {k:'meth',l:'Meth Neurotox'},{k:'alc',l:'Alcohol'},{k:'fasd',l:'FASD'},
    {k:'meds',l:'Antabuse/Vivitrol/Clonidine/Propranolol'},{k:'li',l:'Lithium'},
    {k:'preg',l:'Cocaine Babies'},{k:'mj',l:'MJ & Schiz'},{k:'smoke',l:'Smoke'},
    {k:'steroid',l:'Prednisone'},{k:'op',l:'Opioid Tox'}
  ];
  document.getElementById('ct').innerHTML=`
    <div class="filter-row" id="filterRow">
      ${tabs.map(t=>`<button class="${t.k===cf?'active':''}" onclick="filterRef('${t.k}')">${t.l}</button>`).join('')}
    </div>
    <div id="refContent"></div>`;
  filterRef('all');
}

function filterRef(cf){
  document.querySelectorAll('#filterRow button').forEach(b=>{
    b.classList.toggle('active',b.textContent.toLowerCase().includes(cf)||(cf==='all'&&b.textContent==='All'));
  });
  const fl=cf==='all'?REF:REF.filter(s=>s.t===cf);
  let h='';
  for(const s of fl){
    h+=`<div class="ref-section"><h2 style="border-color:${s.cl}">${s.n}</h2><ul>`;
    for(const x of s.i){
      h+=`<li ${x.mk?'class="must"':''}><strong style="color:${s.cl}">${x.k}:</strong> ${x.v}${x.mk?'<span class="mk-badge">MUST KNOW</span>':''}</li>`;
    }
    h+=`</ul></div>`;
  }
  document.getElementById('refContent').innerHTML=h;
}

function closeAi(){
  document.getElementById('aiModal').classList.remove('show');
}

async function generateAi(){
  const topicSel=document.getElementById('aiTopic').value;
  if(!topicSel){alert('Pick a topic first');return;}
  let topic=topicSel;
  if(topicSel==='weak'){
    const wt=Object.entries(session.wrongTopics).sort((a,b)=>b[1]-a[1]);
    topic=wt.slice(0,3).map(x=>x[0]).join(', ');
  }
  const result=document.getElementById('aiResult');
  result.innerHTML=`<div class="ai-loading"><div class="spinner"></div><div>Generating questions...</div></div>`;
  
  try {
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",
        max_tokens:1500,
        messages:[{
          role:"user",
          content:`You are creating practice questions for a doctoral-level Clinical Psychopharmacology final exam (PP7360). The student needs questions on: ${topic}.

Generate 5 multiple-choice questions in this exact JSON format (no markdown, no preamble):

[
  {"q":"question text","o":["opt A","opt B","opt C","opt D"],"a":2,"e":"explanation"}
]

Where "a" is the 0-indexed correct answer. Make questions clinically relevant, appropriately challenging for a doctoral student with biology/chemistry background, and grounded in standard psychopharmacology (Stahl, Julien). Cover mechanisms, side effects, contraindications, clinical decision-making. Spell out abbreviations on first use.`
        }]
      })
    });
    const data=await res.json();
    let text=data.content.filter(b=>b.type==='text').map(b=>b.text).join('\n');
    text=text.replace(/```json|```/g,'').trim();
    const qs=JSON.parse(text);
    
    // Inject into the active quiz pool and start quiz
    const aiQuestions=qs.map(q=>({...q,pool:'ai',topic:topic,src:'AI'}));
    session.qActive=aiQuestions;
    session.qIdx=0;
    session.qMode='ai';
    closeAi();
    showQuestion();
  } catch(err){
    result.innerHTML=`<div style="color:var(--danger);font-size:.85em;padding:10px;background:rgba(255,107,138,.1);border-radius:6px">
      <strong>Error:</strong> ${err.message}<br><br>
      <span style="color:var(--text-dim)">AI generation requires running this in Claude.ai (it has API access). Won't work on GitHub Pages without an API key. Use the Known/Unknown/Mix pools instead.</span>
    </div>`;
  }
}
